block.exoprosopa-04d-06-nucrid-scrapper.description = Extracts [#ffd5e2]nucridscrap[] from nucrid walls. Faster than a regular nucridscrap crusher. Requires [#d488ea]elixir[] and power to operate.

block.exoprosopa-04d-07-gravitix-drill.name = Discharge Bore
block.exoprosopa-04d-07-gravitix-drill.description = Making use of the unique properties of [#bf97d6]gravitix[], [#edc787]ichor[] is dissected by enormous localized gravitational fields. The resulting reaction is carefully contained and directed towards the ground where it turns much of what was there to less than dust.

