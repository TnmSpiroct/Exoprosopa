item.exoprosopa-01a-01-item-cobalt.name = 钴
item.exoprosopa-01a-01-item-cobalt.description = 用于基础建筑和用作弹药。

item.exoprosopa-01a-02-item-nickel.name = 镍
item.exoprosopa-01a-02-item-nickel.description = 用于基础电子和工厂。

item.exoprosopa-01a-03-item-anthracite.name = 硬碳
item.exoprosopa-01a-03-item-anthracite.description = 用于发电机燃烧、加热。

item.exoprosopa-01a-03-item-aquashard.name = 蓝晶石
item.exoprosopa-01a-03-item-aquashard.description = 富含铁，可使用蓝晶石过滤器过滤。

item.exoprosopa-01a-03-item-lamine.name = Lamine
item.exoprosopa-01a-03-item-lamine.description = High-explosive material, used in heat-related blocks and explosive ammo.

item.exoprosopa-01a-04-item-tantra-sand.name = 辉沙
item.exoprosopa-01a-04-item-tantra-sand.description = 主要用于酏液纯化，也可用于其他成分的提纯。

item.exoprosopa-01a-05-item-aluminium.name = 铝
item.exoprosopa-01a-05-item-aluminium.description = 主要用于单位和电子零件。

item.exoprosopa-01a-05-item-raw-nichrome.name = 镍铬化合物
item.exoprosopa-01a-05-item-raw-nichrome.description = 含有熔融的镍和铬的化合物。可使用元素分离器进行分离。

item.exoprosopa-01a-06-item-chromium.name = 铬
item.exoprosopa-01a-06-item-chromium.description = 坚韧而坚固的材料，可用于许多建筑物和弹药。

item.exoprosopa-01a-07-item-clevorite.name = 克莱岩
item.exoprosopa-01a-07-item-clevorite.description = 许多先进建筑中使用的超导材料。

item.exoprosopa-01a-08-item-petal.name = 地瓣碎片
item.exoprosopa-01a-08-item-petal.description = 作为 Exoprosopa 行星的一部分，它是一种极其坚韧的物质。

item.exoprosopa-01a-08-item-petal-flower.name = Petal Fragment
item.exoprosopa-01a-08-item-petal-flower.description = Extracted flower petal, can be processed with [#ffd5e2]nucridscrap[] to produce [#ff91b3]bloodstone[].

item.exoprosopa-01a-08-item-nucrid.name = Nucridscrap
item.exoprosopa-01a-08-item-nucrid.description = Strong material originating from [#ffd5e2]nucrid[] walls, can be strengthend more with [#ff89af]petal fragments[].

item.exoprosopa-01a-09-item-morphite.name = 莫氏铬
item.exoprosopa-01a-09-item-morphite.description = 变形铬，材料内部蕴含高能量。用于制造各种发电机和弹药。

item.exoprosopa-01a-10-item-bethine.name = 玻色因
item.exoprosopa-01a-10-item-bethine.description = 大量爆炸产生的材料。用作反应堆核心。

item.exoprosopa-01a-11-item-pyroxene.name = 辉石
item.exoprosopa-01a-11-item-pyroxene.description = 神秘材料。用于高科技单位和高级炮塔。

item.exoprosopa-01a-11-item-technoscrap.name = 高科废料
item.exoprosopa-01a-11-item-technoscrap.description = 废料形式的高科电镀。

item.exoprosopa-01a-12-item-techno-plating.name = 高科电镀
item.exoprosopa-01a-12-item-techno-plating.description = 用于逻辑数据和加密。

item.exoprosopa-01a-21-item-gryphic.name = Gryphic
item.exoprosopa-01a-21-item-gryphic.description = Refined [#647cc2]cobalt[], more durable thanks to the added [#60c9ad]necroplasm[].
item.exoprosopa-01a-21-item-gryphic.detail = [cyan]Astral exclusive item.

item.exoprosopa-01a-22-item-crystallic-geode.name = Crystallic Geode
item.exoprosopa-01a-22-item-crystallic-geode.description = Crystalline morphite, it is unknown how they form.
item.exoprosopa-01a-22-item-crystallic-geode.details = Its spiky and electric!

item.exoprosopa-01a-31-item-morphitix-crystal.name = Morphitix Crystal
item.exoprosopa-01a-31-item-morphitix-crystal.description = Another morphite form, uses accelerated crystal instead of normal material.

# Resources - Liquids
