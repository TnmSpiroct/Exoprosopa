block.exoprosopa-09i-01-aluminium-furnace.name = 铝高炉
block.exoprosopa-09i-01-aluminium-furnace.description = 使用硬煤将钴冶炼为铝。\n（哦牛皮你和铱聚变堆坐一桌）

block.exoprosopa-09i-02-a-aluminium-refinery-forge.name = 铝精炼炉
block.exoprosopa-09i-02-a-aluminium-refinery-forge.description = 使用硬煤将钴和镍高效冶炼为铝。\n（你比NH还牛皮这个配方）

block.exoprosopa-09i-02-elixir-converter.name = 酏液纯化器
block.exoprosopa-09i-02-elixir-converter.description = 使用辉沙为介质纯化瘴液。

block.exoprosopa-09i-02-f-elixir-autofreezer.name = 酏液冷冻器
block.exoprosopa-09i-02-f-elixir-autofreezer.description = 使用辉沙和钴高效纯化瘴液。

block.exoprosopa-09i-03-cryo-synthetis-chamber.name = Cryogenics Synthesis Chamber
block.exoprosopa-09i-03-cryo-synthetis-chamber.description = Purifies [#d488ea]elixir[] into [#76C9E5]cryogenics[] without dematerializing it. Uses [#ffd5e2]nucridscrap[] as a main fuel, requires medium amount of power.

block.exoprosopa-09i-04-a-terra-basin.name = 克莱岩塑型器
block.exoprosopa-09i-04-a-terra-basin.description = 使用镍和低温流体生产克莱岩。钴和瘴液作为副产物。

block.exoprosopa-09i-04-b-mini-basin.name = 克莱岩过滤器
