myra.station = [cyan]This is your [accent]Signal Transmission Station[].\n\nIt would contact closer base and send reinforcements to aid you in your operation.\n\nPower the [accent]Signal Navigator[] attached to it to turn it on. Do not let it get turned off after you booted it.\n\n[salmon]DO NOT DECONSTRUCT NOR LET ANY COMPONENTS BE DAMAGED AT ALL COSTS!
myra.proc.errorcode = [salmon]ERROR CODE : 67-251\nINSUFFICIENT OR UNSTABLE POWER INPUT\nPLEASE RESOLVE ISSUE TO ACTIVATE SIGNAL TRANSMISSION STATION

