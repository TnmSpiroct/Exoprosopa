block.exoprosopa-07g-03-burner-generator.description = 在酏液作用下燃烧可燃物以发电。

block.exoprosopa-07g-04-burner-reactor.name = 灼燃反应堆
block.exoprosopa-07g-04-burner-reactor.description = 在铬和低温流体作用下燃烧可燃物以发电。

