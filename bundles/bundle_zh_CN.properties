# STS Relayed Message
myra.message.player = [lightgray]It appears that these [accent]Signal Transmission Station[] can execute special functions.\nBe careful, as though it allow us to gain insight of the area, it also becoming an advantageous for the enemy.
myra.message.passage = [lightgray]It appears the enemy has set up demolition charges to collapse the narrow passage to one of the bases.\nInspect the explosion site, maybe it is still possible to march some units through.\nScanners Indicate that the enemy attempting to hesten their construction of a special missile within their base.
myra.south.west = [lightgray]It appears that the enemy has build a heavy blockage of high end turrets and long range cruise missiles around the south west area.

# Toast Destroyed Enemies STS
mrya.sts1 = [lightgray]You feel a sense of shrouded dread as these [accent]Signal Transmission Station[] are destroyed.
myra.sts2 = [lightgray]You feel the enemies rage grow even more stronger.
myra.sts3 = [lightgray]You see the sky light up with auroras and a railgun shells.

