# Sectors
sector.exoprosopa-19s-01-newgrounds.name = 始发地
sector.exoprosopa-19s-01-newgrounds.description = 你的飞船将你送至该区块以执行第一个任务。\n该区块包含一个小型核心。\n分析该区块，建造建筑以自卫。\n\n[accent]你可以 - 改变命运吗？

sector.exoprosopa-19s-02-mountain-ridge.name = Mountain Ridge
sector.exoprosopa-19s-02-mountain-ridge.description = The only path available from sector [accent]Newgrounds[].\n\nThis sector is rich in [#90bdd8]tantrium[] and anthracite.\nResearch the [accent]Elixir Purifier[] and the [accent]Burner Generator[] to weather the enemies.

sector.exoprosopa-19s-03-hostile-outpost.name = Encampment
sector.exoprosopa-19s-03-hostile-outpost.description = This sector is scarce in [#647cc2]cobalt[] and anthracite deposits in the walls.\n[accent]Bore Jets[] are required to mine ores from the ground.\n\nThe enemy has built a small outpost here with lots of defence.\n[accent]Mech[] and [accent]Walker[] units will be required to increase your offensive ability.

sector.exoprosopa-19s-04-cliffside.name = 峭壁
sector.exoprosopa-19s-04-cliffside.description = 该区块含有[accent]铬[]。\n使用[accent]气膛钻头[]以进行开采。\n\n检测到来临的强大敌人。\n确保在基地薄弱处设置了防空火力。

sector.exoprosopa-19s-05-crest.name = 峰顶
sector.exoprosopa-19s-05-crest.description = 该区块地势崎岖。\n机甲单位是摧毁敌方的唯一手段。\n\n在狭窄的道路迎击敌人，取下该区块。

sector.exoprosopa-19s-06-botanical-garden.name = Botanical Garden
sector.exoprosopa-19s-06-botanical-garden.description = This sector contains large deposits of [#9d7f7f]chromium[] on the opposite side of the island.\nPerfect to test out new transport tech.\n\nResearch [accent]Surge Driver[] and [accent]Shipbay Upgrade Chamber[] to capture the enemy outpost nearby.

sector.exoprosopa-19s-07-escarpment.name = 悬崖
sector.exoprosopa-19s-07-escarpment.description = 敌方将此区域用作前哨站之间的主要交通枢纽。\n\n该地辉岩匮乏，研究[accent]辉岩塑造器[]以作为[accent]辉沙[]的替代来源。\n全力防守来自敌方的猛烈进攻。

sector.exoprosopa-19s-08-cornerstone.name = 基石
sector.exoprosopa-19s-08-cornerstone.description = 该区块附近布满巨大山脉。\n敌方基地隐藏在深山之中。可能需要T2单位才能摧毁其防御工事。\n\n研究[accent]机甲升级设施[]和[accent]坦克升级设施[]以建造T2单位。

sector.exoprosopa-19s-09-hazardous-wasteland.name = Hazardous Wasteland
sector.exoprosopa-19s-09-hazardous-wasteland.description = Rich in [#b979bd]miasma[] but starved of anthracite, this sector is very treacherous.\nBuild [accent]Geothermal Generator[] to generate power.\n\nThe enemy has built a strong base with advanced tech in this sector.\nCapture this sector and acquire the technology.

sector.exoprosopa-19s-10-precipice.name = Precipice
sector.exoprosopa-19s-10-precipice.description = A jagged, fractured canyon formerly used as [accent]Mech Testing Grounds[] by Rhodes.\nThe unsupported terrain makes it very hard to build and operate a base.\n\nUtilize [accent]Surge Launcher[] for transporting resources across the winding terrain.\nBe prepared for attacks from multiple directions.

sector.exoprosopa-19s-11-creek.name = Creek
sector.exoprosopa-19s-11-creek.description = A ravine carved by flowing [#53a999]hydryite[] and rich [#72ccbd]aquamarine[] deposits.\nResearch the [accent]Aquamarine Filter[] and the [accent]Elemental Separator[] as an alternative ways to produce basic materials.\n\nOur radar detected several Rhodes activity in this sector. Do not give them time to send their strongest units.

sector.exoprosopa-19s-12-marshlands.name = Marshlands
sector.exoprosopa-19s-12-marshlands.description = This sector is very large and rich in resources, but will be attacked by the enemy once a new core lands.\n\nUtilizes [#51c59c]morphite[] for further colonization.\nRhodes will send a large punitive force in order to stop your conquest.

# sector.exoprosopa-19s-13-antarstar.name = 
# sector.exoprosopa-19s-13-antarstar.description = 

sector.exoprosopa-19s-14-pier.name = Pier
sector.exoprosopa-19s-14-pier.description = This sector was used by [accent]Gowa Industries[] long ago, it has been claimed by Rhodes over the course of countless wars.\nThe pier and its facility became abandoned and decayed.\n\n[#4fab92]Astral[] naval units have been sighted on the radar, no further data available. It might be stronger than normal units[].\n\n[scarlet]Unidentified aircraft detected[].\n\nUtilize [#51c59c]morphitix plasma[] to create even stronger defences. Use your best strategy against them.

sector.exoprosopa-19s-15-bioproject-core.name = Bioproject Core
sector.exoprosopa-19s-15-bioproject-core.description = An abandoned research facility, toxic and unhabitable.\nVent is scarce and separated across several islands, analyze the remaining tech to survive.\n\nUtilize [accent]Miasma Filtration Unit[] as an alternative solution. Additionally, research [accent]Cargo Bay[] as a main drone-based transportation.\n\n[salmon]Landing area is unstable, disallowed additional starting blocks[].

# sector.exoprosopa-19s-16-polar-station.name = 
# sector.exoprosopa-19s-16-polar-station.description = 

# sector.exoprosopa-19s-17-tundra-peaks.name = 
# sector.exoprosopa-19s-17-tundra-peaks.description = 

sector.exoprosopa-19s-23-eridanus.name = Eridanus
sector.exoprosopa-19s-23-eridanus.description = A zigzag pattern, forces enemy units to take a very long path take out your base in this sector.\nDont be fooled by its large wave spacing, Rhodes will send their units faster the more you progress.\n\nProduce [#bf97d6]gravitix[]. Fend off the enemy.\n\n\n[cyan]WIP

# Optional Sectors
sector.exoprosopa-20t-01-luminary.name = Luminary
sector.exoprosopa-20t-01-luminary.description = Due to lack of vents, you will need a better source of power.\nIt might be a good idea to have air defence around the edges.\n\n\n[accent]Note: This is an optional sector. Capturing it is not required for completing the campaign.

sector.exoprosopa-20t-02-foggy-fields.name = Foggy Fields
sector.exoprosopa-20t-02-foggy-fields.description = Due to a great number of vents present, the sector has occasional foggy episodes.\nThe enemy has built a giant base here. It is recommended to bring large amounts firepower.\n\n\n[accent]Note: This is an optional sector. Capturing it is not required for completing the campaign.

sector.exoprosopa-20t-03-reservoir.name = Abandoned Reservoir
sector.exoprosopa-20t-03-reservoir.description = You land in a cramped sector filled with [#b979bd]miasma[].\nThe sensor detects an enemy base in this sector.\n\nUnfortunately, you must build your production and defence between a lake and distorted environment.\nUse ship units to dismantle the enemy base before the enemy dismantles you.\n\n\n[accent]Note: This is an optional sector. Capturing it is not required for completing the campaign.

sector.exoprosopa-20t-04-trekker-campsite.name = Trekker Campsite
sector.exoprosopa-20t-04-trekker-campsite.description = This is the campsite of the mountain trekker, controlled by Rhodes.\nUse various units to eliminate all enemy cores.\n\n[red]Intel suggests the enemy has nuclear weapons of some form, stay alert for a potential strike!\n\n\n[accent]Note: This is an optional sector. Capturing it is not required for completing the campaign.

sector.exoprosopa-20t-11-ridgeline.name = Ridgeline
sector.exoprosopa-20t-11-ridgeline.description = Rhodes have built a heavily guarded stronghold here. It remains undefeated for years.\nYour goal is to find any exploit and all weaknesses in order to make it fall.\n\n\n[cyan]Modifiers:\n- Terraformic Basin, Terrafilter & Nichrome Dissembler are unavailable.\n\n\n[accent]Note: This is an optional sector. Capturing it is not required for completing the campaign.

sector.exoprosopa-20t-26-clover-springs.name = Clover Springs
sector.exoprosopa-20t-26-clover-springs.description = Hotspring occupied by the [accent]Rhodes Facility[].\nThe lakes generates at the central area, creating almost perfect four clover leafes with several twists.\n\nYou will land on a pre-built base from another agent.\nAdvance to the crater and eliminate all enemy cores.\n\n\n[cyan]WIP\n\n\n[accent]Note: This is an optional sector. Capturing it is not required for completing the campaign.

sector.exoprosopa-20t-37-myrra-heights.name = Myrra Heights
sector.exoprosopa-20t-37-myrra-heights.description = The highest mountain range in frostnova. A home to the Rhodes mightiest operation known.\nThe enemy have been constructing an experimental [#BF97D6]gravitix[] warhead.\n\n[scarlet]BEWARE OF POTENTIAL STRIKE[].\n\nWe will attempt to sent units to aid your endevors of conquest, by contacting [accent]Signal Transmission Station[].\nThe enemy values this sector with all of their might. So expect large amounts of resistance and strife in a myriad of ways.\n\n[cyan]WIP\n\n\n[accent]Note: This is an optional sector. Capturing it is not required for completing the campaign.

sector.exoprosopa-20t-99-ending.name = Ending
sector.exoprosopa-20t-99-ending.description = Are we reaching [gray]The..  End.. ??

