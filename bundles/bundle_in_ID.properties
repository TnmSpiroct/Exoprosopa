block.exoprosopa-flower-large.name = Kelopak Bunga Besar

item.exoprosopa-01a-01-item-cobalt.name = Kobalt
item.exoprosopa-01a-01-item-cobalt.description = Digunakan dalam konstruksi dasar dan sebagai amunisi.

item.exoprosopa-01a-02-item-nickel.name = Nikel
item.exoprosopa-01a-02-item-nickel.description = Digunakan dalam elektronik dasar dan konstruksi pabrik.

item.exoprosopa-01a-03-item-anthracite.name = Antrasit
item.exoprosopa-01a-03-item-anthracite.description = Digunakan dalam generator pembakaran dan pemanasan.

item.exoprosopa-01a-03-item-aquashard.name = Batu Permata
item.exoprosopa-01a-03-item-aquashard.description = Bahan akuatik, mirip dengan [#90bdd8]tantrium[].

item.exoprosopa-01a-03-item-lamine.name = Lamina
item.exoprosopa-01a-03-item-lamine.description = Bahan dengan daya ledak yang tinggi, digunakan sebagai unsur pemanasan dan amunisi peledak.

item.exoprosopa-01a-04-item-tantra-sand.name = Tantrium
item.exoprosopa-01a-04-item-tantra-sand.description = Paling sering digunakan untuk memurnikan [#d488ea]elixir[], memiliki beberapa kegunaan lainnya.

item.exoprosopa-01a-05-item-aluminium.name = Aluminium
item.exoprosopa-01a-05-item-aluminium.description = Bahan utama yang digunakan dalam proses pembuatan unit dan komponen elektronik.

item.exoprosopa-01a-05-item-raw-nichrome.name = Nikrom
item.exoprosopa-01a-05-item-raw-nichrome.description = Paduan [#e1cf9a]nikel[] and [#9d7f7f]kromium[], dikenal sebagai [#a88b65]nikrom[].Dapat dipisahkan menggunakan pemisah unsur.

item.exoprosopa-01a-06-item-chromium.name = Kromium
item.exoprosopa-01a-06-item-chromium.description = Bahan yang kuat dan tangguh digunakan pada bangunan dan amunisi.

item.exoprosopa-01a-07-item-clevorite.name = Klevorit
item.exoprosopa-01a-07-item-clevorite.description = Bahan super konduktif yang digunakan pada bangunan canggih.

item.exoprosopa-01a-08-item-petal.name = Bloodstone
item.exoprosopa-01a-08-item-petal.description = Bahan dengan daya tahan yang tinggi, digunakan dalam perakitan unit canggih dan manipulasi gravitasi.

item.exoprosopa-01a-08-item-petal-flower.name = Pecahan Kelopak Bunga
item.exoprosopa-01a-08-item-petal-flower.description = Kelopak bunga yang diekstrak, dapat diproses dengan [#ffd5e2]nuckid[] untuk menghasilkan [#ff91b3]bloodstone[].

item.exoprosopa-01a-08-item-nucrid.name = Nukrid
item.exoprosopa-01a-08-item-nucrid.description = Bahan yang berasal dari dinding [#ffd5e2]nukrid[], dapat diperkuat dengan [#ff89af]pecahan kelopak bunga[].

item.exoprosopa-01a-09-item-morphite.name = Morpit
item.exoprosopa-01a-09-item-morphite.description = Kristal berenergi tinggi dibuat dari bahan tingkat rendah yang dipercepat. Digunakan dalam pembuatan komponen dan persenjataan berbasis listrik.

item.exoprosopa-01a-10-item-bethine.name = Gravitiks
item.exoprosopa-01a-10-item-bethine.description = Bahan yang digunakan dalam teknologi manipulasi gravitasi dan komponen-komponen canggih.

item.exoprosopa-01a-11-item-pyroxene.name = Piroksen
item.exoprosopa-01a-11-item-pyroxene.description = Material berteknologi tinggi yang digunakan dalam komponen pemulihan diri sendiri.

item.exoprosopa-01a-11-item-technoscrap.name = Rongsokan Tekno
item.exoprosopa-01a-11-item-technoscrap.description = Sekumpulan potongan logam, perlu diproses lebih lanjut agar dapat digunakan.

item.exoprosopa-01a-12-item-techno-plating.name = Lapisan Tekno
item.exoprosopa-01a-12-item-techno-plating.description = Menyimpan sejumlah informasi dan data yang layak digunakan dalam proses logika.

item.exoprosopa-01a-21-item-gryphic.name = Gripik
item.exoprosopa-01a-21-item-gryphic.description = [#647cc2]Kobalt[] yang dihaluskan, diproses dengan [#60c9ad]nekroplasma[] agar tahan lebih lama.
item.exoprosopa-01a-21-item-gryphic.detail = [cyan]Item eksklusif milik Astral.

item.exoprosopa-01a-22-item-crystallic-geode.name = Geoda Kristal
item.exoprosopa-01a-22-item-crystallic-geode.description = Kristal morpit, tidak diketahui bagaimana mereka terbentuk.
item.exoprosopa-01a-22-item-crystallic-geode.details = Tajam dan berlistrik!

item.exoprosopa-01a-31-item-morphitix-crystal.name = Kristal Morpitiks
item.exoprosopa-01a-31-item-morphitix-crystal.description = Bentuk morpit yang lain, menggunakan kristal yang dipercepat, bukan kristal yang normal.

# Resources - Liquid
liquid.exoprosopa-02b-01-bioliquid.name = Elixir
liquid.exoprosopa-02b-01-bioliquid.description = Air yang terkontaminasi dengan cairan biomassa, dapat disaring menjadi kriogenik.

liquid.exoprosopa-02b-02-a-purified-elixir.name = Kriogenik
liquid.exoprosopa-02b-02-a-purified-elixir.description = [#d488ea]Elixir[] yang telah disaring, mampu mengoperasikan pabrik-pabrik canggih. Dapat digunakan sebagai pendingin turret.

liquid.exoprosopa-02b-02-ichor.name = Ikor
liquid.exoprosopa-02b-02-ichor.description = Cairan yang benar-benar murni, digunakan pada teknologi penyembuhan diri sendiri dan pemulihan yang stabil.

liquid.exoprosopa-02b-03-necroplasm.name = Nekroplasma
liquid.exoprosopa-02b-03-necroplasm.description = Cairan mutasi biologis, tumbuh perlahan hingga dapat memperoleh kecerdasannya sendiri.

liquid.exoprosopa-02b-04-miasma.name = Miasma
liquid.exoprosopa-02b-04-miasma.description = Massa asam sulfat yang tidak terkendali, dapat menyebar ke [#d488ea]elixir[].

liquid.exoprosopa-02b-05-hydrowater.name = Hidrit
liquid.exoprosopa-02b-05-hydrowater.description = Digunakan untuk menyaring [#72ccbd]batu permata[], setara dengan [#d488ea]elixir[].

liquid.exoprosopa-02b-06-morphitix-plasma.name = Plasma Morpitiks
liquid.exoprosopa-02b-06-morphitix-plasma.description = Plasma yang dihasilkan melalui pemanasan dan pembuangan [#51c59c]morphite[].

liquid.exoprosopa-02b-07-ectoplasm.name = Ektoplasma
liquid.exoprosopa-02b-07-ectoplasm.description = Cairan mematikan yang terbuat dari [#b979bd]miasma[], sangat eksplosif. Dapat menyebar ke [#d488ea]elixir[].

liquid.exoprosopa-02b-08-nucliogen.name = Nukliogen
liquid.exoprosopa-02b-08-nucliogen.description = Zat berlendir, produk sampingan yang ada di sekitar kelopak bunga.

# Distribution Blocks
block.exoprosopa-05e-01-transport-pipe.name = Pipa Transportasi
block.exoprosopa-05e-01-transport-pipe.description = Memindahkan barang ke depan. Hanya mampu menyimpan satu barang.

block.exoprosopa-05e-02-a-aluminium-pipe.name = Pipa Berbahan Aluminium
block.exoprosopa-05e-02-a-aluminium-pipe.description = Memindahkan barang ke depan. Hanya mampu menyimpan satu barang. Tidak dapat menerima masukan dari samping.

block.exoprosopa-05e-02-chromium-pipe.name = Pipa Berbahan Kromium
block.exoprosopa-05e-02-chromium-pipe.description = Memindahkan barang ke depan. Lebih cepat daripada pipa transportasi.

block.exoprosopa-05e-03-armored-pipe.name = Pipa Berbahan Bloodstone
block.exoprosopa-05e-03-armored-pipe.description = Memindahkan barang ke depan. Tidak dapat menerima masukan dari samping. Berlapis.

block.exoprosopa-05e-03-morphite-conveyor.name = Pipa Berbahan Morpit
block.exoprosopa-05e-03-morphite-conveyor.description = Mengemas tumpukan barang sebelum memindahkannya. Dapat dipercepat saat diberi tenaga.

block.exoprosopa-05e-04-a-morphite-router.name = Pembagi Berbahan Morpit
block.exoprosopa-05e-04-a-morphite-router.description = Mendistribusikan barang secara merata ke tiga arah. Dapat dipercepat saat diberi tenaga.

block.exoprosopa-05e-05-crossblock.name = Persimpangan Pipa
block.exoprosopa-05e-05-crossblock.description = Bertindak sebagai jembatan untuk dua pipa yang bersimpangan.

block.exoprosopa-05e-06-splitter.name = Pembagi Pipa
block.exoprosopa-05e-06-splitter.description = Mendistribusikan barang secara merata ke tiga arah.

block.exoprosopa-05e-07-mechanical-bridge.name = Jembatan Pipa
block.exoprosopa-05e-07-mechanical-bridge.description = Memindahkan barang melintasi medan dan bangunan.

block.exoprosopa-05e-08-pipeline-sorter.name = Penyortir Pipa
block.exoprosopa-05e-08-pipeline-sorter.description = Jika barang yang masuk cocok dengan pilhan, barang akan diantarkan ke depan. Jika tidak, maka akan diantarkan ke kiri dan kanan. Dapat digunakan sebagai pembagi terarah.

block.exoprosopa-05e-10-pipeline-overflow.name = Gerbang Pipa Luapan
block.exoprosopa-05e-10-pipeline-overflow.description = Hanya mengeluarkan barang ke samping jika jalur depan diblokir.

block.exoprosopa-05e-11-morph-bridge.name = Jembatan Berbahan Morpit
block.exoprosopa-05e-11-morph-bridge.description = Memindahkan barang dengan sangat cepat melewati tanah atau bangunan. Memerlukan tenaga.

block.exoprosopa-05e-13-a-surge-driver.name = Penembak Lonjakan
block.exoprosopa-05e-13-a-surge-driver.description = Menembakkan muatan barang ke penembak lonjakan yang tersambung.

block.exoprosopa-05e-13-cargobay.name = Stasiun Kargo
block.exoprosopa-05e-13-cargobay.description = Memuat drone kargo dengan barang-barang yang akan dikirim menuju depot kargo.

block.exoprosopa-05e-14-cargodepot.name = Depot Kargo
block.exoprosopa-05e-14-cargodepot.description = Menerima barang yang diturunkan oleh drone kargo iris.

block.exoprosopa-05e-15-pipeline-unloader.name = Pipa Pembongkar
block.exoprosopa-05e-15-pipeline-unloader.description = Pembongkar terarah yang tidak dapat membongkar inti.

# Drills Blocks
block.exoprosopa-04d-01-pressure-generator.name = Generator Tekanan
block.exoprosopa-04d-01-pressure-generator.description = Menghasilkan tenaga dengan menggunakan tekanan dari ventilasi.

block.exoprosopa-04d-02-elixir-collector.name = Pengumpul Elixir
block.exoprosopa-04d-02-elixir-collector.description = Mengekstrak [#d488ea]elixir[] dari ventilasi, memerlukan tenaga.

block.exoprosopa-04d-02-elixir-extractor.name = Pengekstrak Elixir
block.exoprosopa-04d-02-elixir-extractor.description = Pengekstrak [#d488ea]elixir[] yang lebih besar, memerlukan tenaga.

block.exoprosopa-04d-03-ore-extractor.name = Pengekstrak Bijih
block.exoprosopa-04d-03-ore-extractor.description = Mengekstrak bijih, memerlukan [#d488ea]elixir[] dan tenaga.

block.exoprosopa-04d-03-r-ore-blaster.name = Peledak Bijih
block.exoprosopa-04d-03-r-ore-blaster.description = Pengekstrak bijih yang lebih besar, memerlukan [#76c9e5]kriogenik[].

block.exoprosopa-04d-04-a-wall-extractor.name = Penghancur Tantrium
block.exoprosopa-04d-04-a-wall-extractor.description = Menghancurkan [#90bdd8]tantrium[] dari dinding tantrium.

block.exoprosopa-04d-04-a-wall-shifter.name = Pengekstrak Tantrium
block.exoprosopa-04d-04-a-wall-shifter.description = Mengekstrak [#90bdd8]tantrium[] dari dinding tantrium, lebih cepat daripada penghancur tantrium.

block.exoprosopa-04d-04-b-aqua-dregder.name = Penghancur Batu Permata
block.exoprosopa-04d-04-b-aqua-dregder.description = Menghancurkan dinding akuatik untuk mengekstrak [#72ccbd]batu permata[].

block.exoprosopa-04d-04-b-aqua-extractor.name = Pengekstrak Batu Permata
block.exoprosopa-04d-04-b-aqua-extractor.description = Mengekstrak [#72ccbd]batu permata[] secara perlahan dari ubin akuatik, memerlukan [#53a999]hidrit[].

block.exoprosopa-04d-04-bore-jet.name = Bor Jet
block.exoprosopa-04d-04-bore-jet.description = Menggunakan semburan [#d488ea]elixir[] bertekanan tinggi untuk menambang bijih.

block.exoprosopa-04d-05-ichor-rig.name = Pengebor Ikor
block.exoprosopa-04d-05-ichor-rig.description = Mengekstrak [#edc787]ikor[] dari ubin ikor. Memerlukan [#d488ea]elixir[] dalam jumlah yang besar untuk beroperasi.


block.exoprosopa-04d-06-nucrid-crusher.name = Penghancur Nukrid
block.exoprosopa-04d-06-nucrid-crusher.description = Mengekstrak [#ffd5e2]nukrid[] dari dinding nukrid.

block.exoprosopa-04d-06-nucrid-scrapper.name = Pemecah Nukrid
block.exoprosopa-04d-06-nucrid-scrapper.description = Mengekstrak [#ffd5e2]nukrid[] dari dinding nukrid. Lebih cepat daripada penghancur nukrid. Memerlukan [#d488ea]elixir[] dan tenaga.

block.exoprosopa-04d-07-gravitix-drill.name = Bor Gravitiks
block.exoprosopa-04d-07-gravitix-drill.description = Dengan memanfaatkan sifat unik [#bf97d6]gravitiks[], [#edc787]ikor[] dipecah oleh medan gravitasi lokal yang sangat besar. Reaksi yang dihasilkan kemudian dikendalikan dengan hati-hati dan diarahkan ke tanah, di mana sebagian besar ledakan berubah menjadi debu.

# Liquid Blocks
block.exoprosopa-06f-01-a-sea-conduit.name = Saluran Laut
block.exoprosopa-06f-01-a-sea-conduit.description = Memindahkan cairan ke depan.

block.exoprosopa-06f-01-b-aqua-conduit.name = Saluran Akuatik
block.exoprosopa-06f-01-b-aqua-conduit.description = Memindahkan cairan ke depan, jauh lebih kuat daripada saluran laut.

block.exoprosopa-06f-02-hoverducts.name = Saluran Udara
block.exoprosopa-06f-02-hoverducts.description = Memindahkan cairan menggunakan saluran tanpa gravitasi, jauh lebih cepat daripada saluran akuatik.

block.exoprosopa-06f-02-seaduct-junction.name = Persimpangan Saluran laut
block.exoprosopa-06f-02-seaduct-junction.description = Digunakan untuk melintasi dua saluran air.

block.exoprosopa-06f-03-seaduct-router.name = Pengarah Saluran Laut
block.exoprosopa-06f-03-seaduct-router.description = Mendistribusikan cairan ke tiga arah secara merata.

block.exoprosopa-06f-04-liquidbridge.name = Jembatan Saluran Laut
block.exoprosopa-06f-04-liquidbridge.description = Memindahkan cairan melintasi medan dan bangunan.

block.exoprosopa-06f-04-m-clevoritebridge.name = Jembatan Saluran Laut yang Diperkuat
block.exoprosopa-06f-04-m-clevoritebridge.description = Memindahkan cairan melintasi medan dan bangunan, memiliki jarak yang lebih panjang daripada jembatan saluran laut.

block.exoprosopa-06f-05-a-morph-liquidbridge.name = Jembatan Saluran Morpit
block.exoprosopa-06f-05-a-morph-liquidbridge.description = Memindahkan cairan melintasi medan dan bangunan dengan kecepatan tinggi.

block.exoprosopa-06f-05-jet-pump.name = Pompa Jet
block.exoprosopa-06f-05-jet-pump.description = Memompa dan mengeluarkan cairan. Memerlukan [#76c9e5]kriogenik[].

block.exoprosopa-06f-05-pump.name = Pompa Hidrolik
block.exoprosopa-06f-05-pump.description = Memompa dan mengeluarkan cairan dalam jumlah yang besar. Memerlukan tenaga.

block.exoprosopa-06f-06-aqua-container.name = Kontainer Akuatik
block.exoprosopa-06f-06-aqua-container.description = Menyimpan sejumlah cairan.

block.exoprosopa-06f-07-large-aqua-container.name = Kontainer Akuatik Besar
block.exoprosopa-06f-07-large-aqua-container.description = Menyimpan cairan dalam jumlah yang banyak.

block.exoprosopa-06f-07-massive-container.name = Kontainer Akuatik Sangat Besar
block.exoprosopa-06f-07-massive-container.description = Menyimpan cairan dalam jumlah yang sangat banyak.

block.exoprosopa-06f-08-mfu.name = Unit Penyaringan Miasma
block.exoprosopa-06f-08-mfu.description = Menyaring [#b979bd]miasma[] menjadi [#d488ea]elixir[] menggunakan [#90bdd8]tantrium[]. [red]Hati-hati! Kebocoran pada saluran laut dapat menyebabkan miasma menginfeksi elixir![]

block.exoprosopa-06f-09-nullifier.name = Unit Netralisasi Miasma
block.exoprosopa-06f-09-nullifier.description = Mencampur [#edc787]ikor[] dengan [#ffffff]ektoplasma[] untuk mensintesis [#b979bd]miasma[].

# Logic - Music
block.exoprosopa-12l-001-message-chip.name = Cip Pesan
block.exoprosopa-12l-001-message-chip.description = Menyimpan pesan untuk komunikasi antar sekutu.

block.exoprosopa-12l-002-switch.name = Sakelar Cip
block.exoprosopa-12l-002-switch.description = Beralih antara nilai 1 dan 0 saat diklik.

block.exoprosopa-12l-003-terminator.name = Cip Terminal
block.exoprosopa-12l-003-terminator.description = Menjalankan urutan instruksi logika dalam satu lingkaran. Dapat digunakan untuk mengontrol unit dan bangunan.

block.exoprosopa-12l-004-cell-data.name = Cip Sel Data
block.exoprosopa-12l-004-cell-data.description = Menyimpan informasi untuk cip terminal.

block.exoprosopa-12l-005-cell-data-large.name = Cip Sel Data Besar
block.exoprosopa-12l-005-cell-data-large.description = Menyimpan informasi untuk cip terminal. Berkapasitas besar.

block.exoprosopa-12l-005-mini-projector.name = Cip Proyektor Mini
block.exoprosopa-12l-005-mini-projector.description = Menampilkan data logika secara visual.

block.exoprosopa-12l-005-projector.name = Cip Proyektor
block.exoprosopa-12l-005-projector.description = Menampilkan data logika secara visual.

block.exoprosopa-12l-006-canvas.name = Kanvas
block.exoprosopa-12l-006-canvas.description = Menampilkan gambar sederhana dengan palet yang telah ditentukan sebelumnya. Dapat diedit.

