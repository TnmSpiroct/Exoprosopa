block.exoprosopa-03c-01-impale.description = Fires a piercing compound shell.

block.exoprosopa-03c-02-anvil.name = Anvil
block.exoprosopa-03c-02-anvil.description = Fires five homing bullets at enemies.

block.exoprosopa-03c-02-calamity.name = Calamity
block.exoprosopa-03c-02-calamity.description = Launches exploding shells towards enemies.

block.exoprosopa-03c-02-earthquake.name = Earthquake
block.exoprosopa-03c-02-earthquake.description = Slams down to generate a shockwave that damages enemies and slows them down, increases enemy damage and reload speed as a side effect.

block.exoprosopa-03c-03-a-spewer.name = Spewer
block.exoprosopa-03c-03-a-spewer.description = Rapidly fires drops of liquid at enemies. Capable of extinguishing fires.

block.exoprosopa-03c-03-vulcan.name = Vulcan
block.exoprosopa-03c-03-vulcan.description = Shoots a laser that pushes enemies away.

block.exoprosopa-03c-04-a-canace.name = Canace
block.exoprosopa-03c-04-a-canace.description = Fires explosive cluster grenades that scatter into puddles of slag and inflict melting effect. Deals more damage with a direct hit.

block.exoprosopa-03c-04-b-subsonic.name = Influx
block.exoprosopa-03c-04-b-subsonic.description = Charges up and discharges electrical arcs in a cone.

block.exoprosopa-03c-04-ox.name = Ox
block.exoprosopa-03c-04-ox.description = Rapidly fires bolts at enemy targets.

block.exoprosopa-03c-04-preject.name = Deprive
block.exoprosopa-03c-04-preject.description = Fires barrages of bullets at enemy targets over long distances, dealing massive AoE damage.

block.exoprosopa-03c-04-sprayer.name = Sprayer
block.exoprosopa-03c-04-sprayer.description =

block.exoprosopa-03c-05-equinox.name = Equinox
block.exoprosopa-03c-05-equinox.description = Fires volleys of charged piercing projectiles.

block.exoprosopa-03c-06-continuum.name = Continuum
block.exoprosopa-03c-06-continuum.description = Fires a slow-moving single-target laser at enemy targets.

block.exoprosopa-03c-07-phalanx.name = Phalanx
block.exoprosopa-03c-07-phalanx.description = Fires plasma bullets at enemy aircraft.

block.exoprosopa-03c-08-scathe.name = Snow White
block.exoprosopa-03c-08-scathe.description = Fires a missile over vast distance, cannot damage air units.

block.exoprosopa-03c-08-shigure.name = Phantasm
block.exoprosopa-03c-08-shigure.description = Rapidly blasts bullets at enemies. Specialized at dealing with single enemies, head-on. Less efficient against swarms.

block.exoprosopa-03c-08-skyhammer.name = Skyhammer
block.exoprosopa-03c-08-skyhammer.description = Fires explosive artillery at enemies.

block.exoprosopa-03c-09-plasmyr.name = Plasmyr
block.exoprosopa-03c-09-plasmyr.description = launches high-energy projectiles at enemies, pierces through armored enemies.

