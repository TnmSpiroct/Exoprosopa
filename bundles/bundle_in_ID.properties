block.exoprosopa-11k-05-a-enforcer.description = Creates shockwaves that damages enemy projectiles. Requires [#60c9ad]nekroplasma[].

block.exoprosopa-11k-05-a-healer.name = Auto-Repairer
block.exoprosopa-11k-05-a-healer.description = Automatically repairs blocks in range, requires [#76c9e5]cryogenics[] and power.

block.exoprosopa-11k-05-holoshield.name = Holoshield
block.exoprosopa-11k-05-holoshield.description = Creates a square shield that blocks enemy projectiles, requires [#76c9e5]cryogenics[] and power.

block.exoprosopa-11k-06-illuminator.name = Signal Navigator
block.exoprosopa-11k-06-illuminator.description = Uncovers fog in a large area, requires power.

block.exoprosopa-11k-07-buoy.name = Survey Buoy
block.exoprosopa-11k-07-buoy.description = Uncovers fog in a medium range, can be placed on water.

block.exoprosopa-11k-07-landmine.name = Discharge Landmine
block.exoprosopa-11k-07-landmine.description = Discharges when enemies step on it. Dealing massive damage.

block.exoprosopa-11k-07-morphite-overdrive.name = Morphite Overdrive
block.exoprosopa-11k-07-morphite-overdrive.description = Overdrives all blocks in range.

block.exoprosopa-11k-08-build-tower.name = Build Tower
block.exoprosopa-11k-08-build-tower.description = Uncovers fog in a medium range, can be placed on water.

block.exoprosopa-11k-10-fog-blocks.name = Fog Maker
block.exoprosopa-11k-10-fog-blocks.description = Additional fog border in aqua biome, editor only.

block.exoprosopa-11k-11-global-radar.name = Global Radar
block.exoprosopa-11k-11-global-radar.description = Instantly uncovers fog and illuminates terrain.

block.exoprosopa-91z-00-core-accelerator.name = Ultimate Accelerator
block.exoprosopa-91z-00-core-accelerator.description = Accelerates cores and launch it across the space.

