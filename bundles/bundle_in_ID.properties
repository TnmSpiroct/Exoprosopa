# Power Blocks
block.exoprosopa-07g-01-powerline.name = Jalur Tenaga
block.exoprosopa-07g-01-powerline.description = Mentransmisikan tenaga ke blok lain secara ortogonal.

block.exoprosopa-07g-01-q-powerbeam.name = Jalur Sinar
block.exoprosopa-07g-01-q-powerbeam.description = Mentransmisikan tenaga ke blok lain secara ortogonal. Memiliki jangkauan lebih luas daripada jalur tenaga.

block.exoprosopa-07g-02-large-powerline.name = Jalur Tenaga Besar
block.exoprosopa-07g-02-large-powerline.description = Mentransmisikan tenaga ke blok lain dengan jarak yang sangat jauh. Hanya memiliki satu sambungan.

block.exoprosopa-07g-02-las-morphite-node.name = Simpul Morpit
block.exoprosopa-07g-02-las-morphite-node.description = Mentransmisikan tenaga ke blok lain dalam jarak menengah. Dapat tersambung ke 15 simpul lainnya.

block.exoprosopa-07g-02-lb-supernode.name = Simpul Tes
block.exoprosopa-07g-02-lb-supernode.description = Mentransmisikan tenaga ke blok lain. Berguna untuk pemeriksaan kelistrikan markas pemain maupun musuh di penyunting.

block.exoprosopa-07g-02-m-small-powerbank.name = Baterai Portabel
block.exoprosopa-07g-02-m-small-powerbank.description = Baterai yang mampu menyimpan tenaga dalam jumlah yang besar.

block.exoprosopa-07g-03-a-powerbank.name = Baterai Portabel Besar
block.exoprosopa-07g-03-a-powerbank.description = Baterai yang mampu menyimpan tenaga dalam jumlah yang sangat besar.

block.exoprosopa-07g-03-b-power-director.name = Pengalih Tenaga
block.exoprosopa-07g-03-b-power-director.description = Mengalirkan tenaga baterai hanya dari satu arah jika tenaga di sisi lainnya lebih sedikit.

block.exoprosopa-07g-03-burner-generator.name = Generator Pembakar
block.exoprosopa-07g-03-burner-generator.description = Membakar bahan yang mudah terbakar menggunakan [#d488ea]elixir[] untuk menghasilkan tenaga.

block.exoprosopa-07g-04-burner-reactor.name = Reaktor Pembakar
block.exoprosopa-07g-04-burner-reactor.description = Membakar bahan yang mudah terbakar untuk menghasilkan tenaga. Memerlukan [#76c9e5]kriogenik[] dan [#9d7f7f]kromium[].

block.exoprosopa-07g-05-a-geogenerator.name = Generator Geotermal
block.exoprosopa-07g-05-a-geogenerator.description = Menggunakan [#b979bd]miasma[] dan [#76c9e5]kriogenik[] untuk memanaskan permukaan dan menghasilkan tenaga.

block.exoprosopa-07g-05-morphite-solarpanel.name = Panel Eksosfer
block.exoprosopa-07g-05-morphite-solarpanel.description = Menghasilkan sejumlah kecil tenaga secara pasif.

block.exoprosopa-07g-05-tokamak-reactor.name = Reaktor Tokamak
block.exoprosopa-07g-05-tokamak-reactor.description = Menghasilkan tenaga dalam jumlah yang besar melalui pencampuran [#51c59c]plasma morpitiks[] dan [#edc787]ikor[] yang dipanaskan. Meledak jika cairan yang disediakan tidak mencukupi.

block.exoprosopa-07g-10-necroplasm-reactor.name = Reaktor Nekroplasia
block.exoprosopa-07g-10-necroplasm-reactor.description = Menggunakan radioaktivitas [#60c9ad]nekroplasma[] untuk menghasilkan tenaga dan [#ffffff]ektoplasma[] yang berbahaya sebagai produk sampingan. Meledak jika [#ffffff]ektoplasma[] tidak dikeluarkan dari reaktor melalui saluran.

block.exoprosopa-07g-11-hybrid-reactor.name = Reaktor Hibrida
block.exoprosopa-07g-11-hybrid-reactor.description = Menggunakan berbagai macam cairan untuk mendifusikan piroksen.

# Production - Blocks
block.exoprosopa-09i-01-aluminium-furnace.name = Tungku Aluminium
block.exoprosopa-09i-01-aluminium-furnace.description = Memanaskan [#647cc2]kobalt[] menjadi [#729aaf]aluminium[] menggunakan antrasit sebagai bahan bakar.

block.exoprosopa-09i-02-a-aluminium-refinery-forge.name = Kilang Penempaan Aluminium
block.exoprosopa-09i-02-a-aluminium-refinery-forge.description = Memanaskan [#e1cf9a]nikel[] dan [#647cc2]kobalt[] menggunakan antrasit dalam jumlah yang besar. Proses ini memproduksi [#729aaf]aluminium[] dalam jumlah yang besar.

block.exoprosopa-09i-02-elixir-converter.name = Penyaring Elixir
block.exoprosopa-09i-02-elixir-converter.description = Menyaring [#d488ea]elixir[] menggunakan [#90bdd8]tantrium[] sebagai filter.

block.exoprosopa-09i-02-f-elixir-autofreezer.name = Pembeku Elixir Otomatis
block.exoprosopa-09i-02-f-elixir-autofreezer.description = Menyaring [#d488ea]elixir[] lebih cepat daripada penyaring elixir. Menggunakan [#90bdd8]tantrium[] sebagai filter dan [#647cc2]kobalt[] untuk efisiensi yang lebih baik.

block.exoprosopa-09i-03-cryo-synthetis-chamber.name = Ruang Sintesis Kriogenik
block.exoprosopa-09i-03-cryo-synthetis-chamber.description = Menyaring [#d488ea]elixir[] menjadi [#76C9E5]kriogenik[] tanpa mendematerialisasikannya. Menggunakan [#ffd5e2]nukrid[] sebagai bahan bakar utama.

block.exoprosopa-09i-04-a-terra-basin.name = Pelebur Terraformik
block.exoprosopa-09i-04-a-terra-basin.description = Menggunakan [#76c9e5]kriogenik[] untuk mengubah [#e1cf9a]nikel[], mengekspos [#afe986]klevorit[] bermuatan tinggi. Menghasilkan [#647cc2]kobalt[] dan [#d488ea]elixir[] sebagai produk sampingan.

block.exoprosopa-09i-04-b-mini-basin.name = Filter Terra
block.exoprosopa-09i-04-b-mini-basin.description = Menggunakan [#76c9e5]kriogenik[] dan [#b979bd]miasma[] untuk mengubah [#e1cf9a]nikel[] menjadi [#afe986]klevorit[]. Memiliki tingkat konversi yang tinggi dan tidak menghasilkan produk sampingan apapun.

block.exoprosopa-09i-04-clevorite-disassembler.name = Pembongkar Nikrom
block.exoprosopa-09i-04-clevorite-disassembler.description = Membuat [#afe986]klevorit[] dengan [#a88b65]nikrom[] dan [#76c9e5]kriogenik[]. Menghasilkan [#729aaf]aluminium[] and [#9d7f7f]kromium[] sebagai produk sampingan.

block.exoprosopa-09i-04-heavy-ichor-mixer.name = Pencampur Ikor
block.exoprosopa-09i-04-heavy-ichor-mixer.description = Mencampur [#76C9E5]kriogenik[] dengan [#90BDD8]tantrium[] untuk menghasilkan [#edc787]ikor[].

block.exoprosopa-09i-04-ichor-regulator.name = Regulator Ikor
block.exoprosopa-09i-04-ichor-regulator.description = Mencampur [#76C9E5]kriogenik[] dengan [#FFD5E2]nukrid[] untuk menghasilkan [#edc787]ikor[] dalam jumlah yang besar. Memerlukan panas untuk beroperasi.

block.exoprosopa-09i-04-laminator.name = Laminasi
block.exoprosopa-09i-04-laminator.description = Memproduksi lamina dengan menggabungkan antrasit dan [#e1cf9a]nikel[] menggunakan [#b979bd]miasma[] sebagai pemisah.

block.exoprosopa-09i-04-lamine-chamber.name = Ruangan Laminasi
block.exoprosopa-09i-04-lamine-chamber.description = Mengubah [#afe986]klevorit[] menjadi lamina dalam jumlah yang besar dengan bantuan [#edc787]ikor[].

block.exoprosopa-09i-04-tantraformer.name = Pembentuk Tantra
block.exoprosopa-09i-04-tantraformer.description = Menggiling [#e1cf9a]nikel[] dan antrasit untuk menghasilkan [#90bdd8]tantrium[]. Memerlukan [#d488ea]elixir[] untuk memulai proses penggilingan.

block.exoprosopa-09i-04-u-aquafilter.name = Filter Batu Permata
block.exoprosopa-09i-04-u-aquafilter.description = Menggunakan [#53a999]hidrit[] untuk menyaring [#72ccbd]batu permata[] menjadi [#647cc2]kobalt[] and [#a88b65]nikrom.[]

block.exoprosopa-09i-04-v-elemental-separator.name = Pemisah Elemen
block.exoprosopa-09i-04-v-elemental-separator.description = Memisahkan [#a88b65]nikrom[] menggunakan [#90bdd8]tantrium[] dan [#53a999]hidrit.[]

block.exoprosopa-09i-11-morphifier-crystallizer.name = Akselerator Morpit
block.exoprosopa-09i-11-morphifier-crystallizer.description = Mempercepat [#9d7f7f]kromium[] dengan kecepatan tinggi menggunakan [#76c9e5]kriogenik[] untuk menghasilkan [#51c59c]morpit[] berenergi tinggi dan [#ffffff]ektoplasma[] sebagai produk sampingan.

block.exoprosopa-09i-11-n-morphite-liquidfier.name = Pelepasan Muatan Morpit
block.exoprosopa-09i-11-n-morphite-liquidfier.description = Memanaskan [#51c59c]morpit[] dengan [#b979bd]miasma[] dan [#edc787]ikor[] untuk menghasilkan [#51c59c]plasma morpitiks[].

block.exoprosopa-09i-11-o-anthracite-heater.name = Pemanas Antrasit
block.exoprosopa-09i-11-o-anthracite-heater.description = Membakar antrasit untuk menghasilkan panas dalam jumlah kecil.

block.exoprosopa-09i-11-o-miasma-heater.name = Pemanas Miasma
block.exoprosopa-09i-11-o-miasma-heater.description = Menggunakan bahan bakar organik untuk menghasilkan panas dalam jumlah sedang.

block.exoprosopa-09i-11-o-radiative-heater.name = Pemanas Radiatif
block.exoprosopa-09i-11-o-radiative-heater.description = Menggunakan lamina dan [#C63B64]nukliogen[] untuk menghasilkan panas dalam jumlah besar.

block.exoprosopa-09i-11-p-heat-redirector.name = Konektor Panas
block.exoprosopa-09i-11-p-heat-redirector.description = Mengalihkan akumulasi panas ke blok lain.

block.exoprosopa-09i-11-q-heat-router.name = Pembagi Panas
block.exoprosopa-09i-11-q-heat-router.description = Menyebarkan akumulasi panas ke tiga arah.

block.exoprosopa-09i-12-elixir-crafter.name = Peracik Bio
block.exoprosopa-09i-12-elixir-crafter.description = Menguraikan [#C63B64]nukliogen[] menjadi elixir. Bekerja lebih baik pada permukaan [#ffd5e2]nukrid[].

block.exoprosopa-09i-12-enchanting-basin.name = Pelebur Ajaib
block.exoprosopa-09i-12-enchanting-basin.description = Menggabungkan dan memperkuat nukrid dengan [#ff89af]pecahan kelopak bunga[] untuk menghasilkan [#ff91b3]bloodstone[]. Memerlukan [#C63B64]nukliogen[] dan tenaga.

block.exoprosopa-09i-12-gravitix-chamber-core.name = Ruang Inti Gravitiks
block.exoprosopa-09i-12-gravitix-chamber-core.description = Memanfaatkan medan magnet yang sangat kuat untuk menggabungkan [#729aaf]aluminium[] dan [#ff91b3]bloodstone[] menjadi [#bf97d6]gravitiks[]. Memerlukan [#edc787]ikor[] dan panas.

block.exoprosopa-09i-12-necrolysis-boiler.name = Ketel Uap Nekrolisis
block.exoprosopa-09i-12-necrolysis-boiler.description = Mengubah [#60c9ad]miasma[] menjadi [#60c9ad]nekroplasma[] dengan panas bersuhu tinggi.

block.exoprosopa-09i-13-technoworks.name = Mesin Tekno
block.exoprosopa-09i-13-technoworks.description = Memurnikan rongsokan tekno menjadi lapisan tekno dengan memanaskan dan mendinginkannya berulang kali.

block.exoprosopa-09i-15-pyroforge.name = Tungku Piroksen
block.exoprosopa-09i-15-pyroforge.description = Menghasilkan piroksen dari material terkuat. Memerlukan sejumlah besar [#60c9ad]nekroplasma[].

block.exoprosopa-09i-20-pipeline-incinerator.name = Insinerator Biotik
block.exoprosopa-09i-20-pipeline-incinerator.description = Menggunakan [#60c9ad]miasma[] untuk membakar item yang masuk.

