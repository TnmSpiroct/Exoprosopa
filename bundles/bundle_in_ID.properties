militaryjunkyard.exovents = [cyan]These are [accent]Exovents[]\nThe [accent]Exovents[] can generate more power and resources!

ending.thanks = [cyan]You have reached the end of the campaign for now.\nAt this point, you should have researched [#bf97d6]gravitix[] and ready for upcoming update.\n\nYou can make your own maps and send it on [accent]My Exoprosopa Server[].\nIf its good, I will add it to the campaign.\n\nYou can do anything in here, this sector is automatically captured after 5 minutes.\n\n[accent]Thankyou for playing!

