block.exoprosopa-10j-11-a-basic-module.description = Increases an assembler tier by 1 when placed next to its bounding box. Can be used as an additional payload input.

block.exoprosopa-10j-11-advanced-module-a.name = Advanced Expansion Module
block.exoprosopa-10j-11-advanced-module-a.description = Increases an assembler tier by 1 when placed next to its bounding box. Can be used as an additional payload input. Requires previous Expansion Module to be placed.

block.exoprosopa-10j-12-regenerator.name = Regenerator
block.exoprosopa-10j-12-regenerator.description = Constantly repairs all units in its range. Requires power.

block.exoprosopa-10j-13-prime-regenerator.name = Prime Regenerator
block.exoprosopa-10j-13-prime-regenerator.description = Constantly repairs all units in its range at faster rate. Requires ichor and power to operate.

block.exoprosopa-10j-14-payload-conveyor.name = Large Transporter
block.exoprosopa-10j-14-payload-conveyor.description = Transports units and blocks.

block.exoprosopa-10j-15-payload-router.name = Large Splitter
block.exoprosopa-10j-15-payload-router.description = Distributes inputted payload to up to three output directions.

block.exoprosopa-10j-15-surge-launcher.name = Surge Launcher
block.exoprosopa-10j-15-surge-launcher.description = Launches payloads to another connected Surge Launcher in range.

