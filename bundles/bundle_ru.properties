unit.exoprosopa-16p-05-xenoct.name = Монарх
unit.exoprosopa-16p-05-xenoct.description = Стреляет пробивной шрапнелью вблизи. Имеет самонаводящиеся ракеты для целей на расстоянии. Перелезать через блоки

