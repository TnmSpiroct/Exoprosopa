unit.exoprosopa-18r-04-matrix.name = Матрица
unit.exoprosopa-18r-04-matrix.description = Стреляет оглушающими пульсирующими пулями. Создаёт мощное защитное поле на близких единиц. Наносит урон близким единицам при смерти.

unit.exoprosopa-18r-05-program.name = Программа
unit.exoprosopa-18r-05-program.description = Стреляет пробивающими пулями, что взрываются при контакте. Снабжён точечной защитой. Способен регенерировать. Наносит урон близким единицам при смерти.

# Mech Units
