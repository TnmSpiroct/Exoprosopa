# < Myrra Objectives Region >
myra.south = [cyan]Двигайтесь на юго-запад для получения дальнейших инструкций.
myra.station = [cyan]Это ваша [accent]Станция передачи сигнала[].\n\nОна свяжется с ближайшими базами и запросит подкрепление, для помощи вам.\n\nЗапитайте [accent]Направитель сигнала[] присоединённый к ней, для включения. Не позволяйте ему выключаться после включения.\n\n[salmon]НЕ ДОПУСКАТЬ РАЗБОРА ИЛИ ПОВРЕЖДЕНИЙ ЛЮБОЙ ЦЕНОЙ!
myra.proc.errorcode = [salmon]КОД ОШИБКИ : 67-251\nНЕДОСТАТОЧНОЕ ИЛИ ПЕРЕМЕННОЕ ПИТАНИЕ\nПОЖАЛУЙСТА, УСТРАНИТЕ ПРОБЛЕМУ ДЛЯ ФУНКЦИОНИРОВАНИЯ НАПРАВИТЕЛЯ СИГНАЛА

myra.tier2 = [accent]Вражеское производство эскалирует\nдо [#ffb266]2 уровня[]\nчерез [lightgray]{0}
myra.tier3 = [accent]Вражеское производство эскалирует\nдо [#ff9933]3 уровня[]\nчерез [lightgray]{0}
myra.tier4 = [accent]Вражеское производство эскалирует\nдо [#ff8000]4 уровня[]\nчерез [lightgray]{0}
myra.rancor = [accent]Вражеское производство [#00ffff]Гнева[] начнётся через [lightgray]{0}
myra.monarch = [accent]Вражеское производство [#ff8000]Монархов[] начнётся через [lightgray]{0}
myra.archangel = [accent]Вражеское производство [#ffff00]Архангелов[] начнётся через [lightgray]{0}

myra.nuke = [red]⚠ ПРИБЛИЖАЕТСЯ ЯДЕРНЫЙ УДАР ⚠
myra.passage = [red]⚠ ПРОХОД УНИЧТОЖЕН ⚠
myra.exosphere = [red]Внимание![]\n[accent]Мощный [cyan]Ледяной шторм[] на горизонте!
myra.wave = [lightgray]Вы слышите шум приближающейся армии.
myra.stationdead = [cyan]Наша [accent]Станция передачи сигнала[] уничтожена!\nМы больше [red]не можем[] связатся с соседними базами для подкреплений.
myra.message.relayed = [cyan]Новое сообщение принято вашей [accent]Станцией передачи сигнала!

