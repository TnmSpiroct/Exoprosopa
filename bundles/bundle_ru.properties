# STS Relayed Message
myra.message.player = [lightgray]Похоже, что эта [accent]Станция передачи сигнала[] имеет специальные функции.\nОсторожнее, сколь сильно они могут помочь в захвате области, столь же сильно они могут помочь врагу.
myra.message.passage = [lightgray]Похоже, что противник установил подрывные заряды, дабы уничтожить проход к одной из наших баз.\nИзучите место взрыва, может некоторые юниты ещё смогут пройти.\nСканеры указывают на то, что противник пытается помешать строительству специальной ракеты на своей базе.
myra.south.west = [lightgray]Похоже, что противник устроил тяжёлую блокаду из высокомощных турелей и дальнобойных ракет вокруг юго-западной области.

# Toast Destroyed Enemies STS
mrya.sts1 = [lightgray]Вы чувствуете нарастающий ужас, когда [accent]Станция передачи сигнала[] уничтожается.
myra.sts2 = [lightgray]Вы чувствуете, что вражеская ярость растёт ещё сильнее.
myra.sts3 = [lightgray]Вы видите, как небо сияет от северных сияний и рельсотронных выстрелов.

