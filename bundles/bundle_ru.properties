militaryjunkyard.exovents = [cyan]Тут есть [accent]Экзорасщелины[].\n[accent]Экзорасщелины[] могут генерировать больше энергии и ресурсов!

ending.thanks = [cyan]Сейчас вы достигли конца компании.\nК этому моменту вы должны исследовать [#bf97d6]Гравитикс[] и быть готовым к следующему обновлению.\n\nВы можете создать свои карты и прислать их на[accent]сервер Экзопрозопы[].\nЕсли она выйдет хорошей, я могу добавить её в кампанию.\n\nМожете делать тут что хотите, сектор автозахватится через 5 минут.\n\n[accent]Спасибо за игру!

