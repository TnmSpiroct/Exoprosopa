# Mod Info
mod.exoprosopa.name = [#93e2ee]Экзопрозопа
mod.exoprosopa.author = TnmSpiroct
mod.exoprosopa.description = [#93E2EE]Экзопрозопа[] добавляет Фростнову - третью планету, вместе с с новым древом исследования и окружением. \n\nОтполированный контент и линейный прогресс. \nЗахват и завоевание более 22 секторов. \nБолее 21 предмета для исследования, 265 блоков для изучения, и 30 уникальных юнитов для создания! !\nЗахватите планету своими технологиями до того, как Астральная Инфекция проснёться, и завоюет всю планету.\n\n[accent]Спасибо что играете!\nВы можете предлагать свои карты или идеи присоединившись к дискорд серверу!\nСсылка на него в моём профиле на GitHub. Мой ник - TnmSpiroct.
mod.exoprosopa.subtitle = [#93e2ee]V0.9 Пред-финальное обновление!

# < Campaign Objectives Region >
newgrounds.welcome = [cyan]Добро пожаловать на [#93E2EE]Фростнову[].\n\nВаша цель стоит в завоевании планеты и борьбы супротив Астрального Заражения.\n\n[accent]Удачи!
newgrounds.move = [cyan]Нажмите [accent][WASD][] или [accent]перетаскивайте[] экран для движения юнитом ядра.\n[accent]Прокрутите колёсико мыши[] или [accent]тяните двумя пальцами[] экран для приближения и отдаления камеры.\n\[accent]Левый щелчок мыши[] или [accent]двойное нажатие[] на [#647cc2]Кобальтовую[] руду, что бы копать её.
newgrounds.mining = [cyan]Копайте [#647cc2]Кобальт[] из стены.\nЭтот ресурс используеться в множестве построек. 
newgrounds.generator = [cyan]Исследуйте [accent] Генератор давления[] в \ue875 древе исследований.\n\nРазместите его на скважине для генерации \ue810 энергии.
newgrounds.extractor = [cyan]Исследуйте [accent]Рудный экстрактор[] в \ue875 древе исследований.\n\nРазместите [accent]Рудный экстрактор[] направлением в [#647cc2]кобальтовую[] стену.
newgrounds.elixir = [cyan]Исследуйте [accent]Сборщик элексира[] в \ue875 древе исследований.\n\nРазместите его на скважине для добычи [#d488ea]Элексира[].
newgrounds.powerline = [cyan]Исследуйте и постройте 3 [accent]Энергопередатчика[] для передачи энергии\nна другие блоки по 4 сторонам.
newgrounds.conduit = [cyan]Снабдите [accent]Рудный экстрактор[] [#d488ea]Элексиром[] из [accent]Сборщика элексира[], используя [accent]Жидкостный передатчик[].
newgrounds.pipe = [cyan]Соедините [accent]Рудный экстрактор[] со своим ядром,\nпостроив несколько [accent]Транспортных труб[], для транспортировки добытого [#647cc2]Кобальта[] в ядро.
newgrounds.nickel = [#e1cf9a]Никель[cyan] необходим для большинства производств на Экзопрозопе.\n\nРасширяйте добычу.
newgrounds.vent = [cyan]Установите больше [accent]Сборщиков элексира[],\nдля поддержания большего числа [accent]Рудных экстракторов[].
newgrounds.furnace = [cyan]Исследуйте [accent]Алюминиевую плавильню[].\n\nЭтот завод требует [#647cc2]Кобальт[], Антрацит, и [accent]энергию[]\nдля выплавления [#729aaf]Аллюминия[].\n\n\ue804 Добудьте [accent]Антрацит[] вот здесь \ue804.
newgrounds.aluminium = [cyan]Расширяйте производство.\nПолучите [accent]250 алюминия[], что бы построить [accent]Фабрику единиц[].
newgrounds.anthracite = [accent]Антрацит[cyan] выступает в качестве топлива для [accent]Плавильни алюминия[cyan].\nЯдро [red]не примет [cyan]антрацит как материал.
newgrounds.shipbay = [cyan]Исследуйте [accent]Корабельный док[] в \ue875 древе исследований.\n\nПодведите необходимые ресурсы, что бы произвести своего первого юнита.
newgrounds.codex = [cyan]Произведите юнита: Искра\n\nКорабельный док требует:\n[#e1cf9a]Никель[], [#729aaf]Алюминий[], [#d488ea] Элексир[], и [accent]Энергию[].
newgrounds.command = [cyan]Для командования юнитами:\n\nНажмите [accent]Shift + ЛКМ[] или нажмите кнопку [accent]Командовать[], что бы выбрать юнита. Зажмите и перетаскивайте для выбора группы.\nПосле: [accent]Shift + ПКМ[] или [accent]нажатие[] в случайное место, для перемещения юнитов туда.\n\nУправление юнитом:\n\nНажмите [accent]Ctrl + ЛКМ[] или [accent]двойное нажатие[] на юнита, что бы управлять им.\nНажмите [accent][V][] или [accent]нажатие[] на иконку юнита сверху слева для выхода из режима контроля.\nВы так же можете управлять [accent]Турелями[] и, что более важно, [accent]разделителем[].
newgrounds.impale = [cyan]Откройте \ue875 древо исследования и изучите [accent]Пронзание[].\nСнабдите турель [#647cc2]Кобальтом[] или [#729aaf]Алюминием[], как боеприпас.\n\nЭта турель стреляет пронзающим снарядом в сторону врагов.
newgrounds.wall = [cyan]Изучите [accent]Кобальтовую стену[] в древе исследований, \ue875\nдля защиты ваших построек от вражеского огня.
newgrounds.enemy = [cyan]Подчините этот сектор путём захвата [accent]вражеского ядра[].\n[red]Противник уязвим, начните контратаку!

attack.timer = [red]Подготовьтесь к вражеской атаке!
objective.warn = [red]Внимание !!!
objective.news = [accent]Подкрепление\nприбыло !!!
objective.t1 = [accent]Производство вражеских единиц 1 уровня начнёться через [lightgray]{0}
objective.t2 = [accent]Производство вражеских единиц 2 уровня начнёться через [lightgray]{0}
objective.t3 = [accent]Производство вражеских единиц 3 уровня начнёться через [lightgray]{0}
objective.t4 = [accent]Производство вражеских единиц 4 уровня начнёться через [lightgray]{0}
objective.t5 = [accent]Производство вражеских единиц 5 уровня начнёться через [lightgray]{0}

mountainridge.tantrium = [cyan]Этот сектор богат [#90bdd8]Тантрием[].\n\nДобудьте [#90bdd8]Тантрий[] из Тантриевых стен, используя [accent]Тантриевый бур[].
mountainridge.purify = [cyan]Используйте [accent]Очиститель элексира[], для очистки [#d488ea]Элексира[]\nиспользуя [#90bdd8]тантрий[] для производства [#76c9e5]Криогеники[].\n\nЕё можно использовать для охлаждения ваших турелей и ускорения [accent]Рудных экстракторов[].
mountainridge.burnergen = [cyan]Скважины это хороший источник энергии, но они ограничены.\nПостройте [accent]Генератор горения[], для производства дополнительной энергии.

sealedoutpost.borejet = [cyan]Этот сектор богат подземными залежами кобальта и антрацита.\nИсследуйте [accent]Реактивный бур[] для добычи ресурсов из под земли.

foggyfields.guardian = [cyan]Противник вышлет запасные силы после 8 минут.\nЗахватите сектор до появления стража.

crest.mech = [cyan]На этом секторе много бездорожья.\nИспользуйте [accent]Мехов[] для атаки на противника.

cliffside.borejet = [cyan]Изучите и постройте [accent]Реактивный бур[] на [#9d7f7f]Хроме[], что бы добывать его.
cliffside.chromium = [cyan]На этом секторе есть залежи [#9d7f7f]Хрома[].\nДля его добычи требуются [accent]Реактивные буры[].

bgard.sdriver = [cyan]Исследуйте [accent]Ударный ускоритель[cyan] в \ue875 древе исследования.\nУстановите 2 [accent]Ударных ускорителя[] в обозначеных точках.\n\nСоедините [accent]Ударные ускорители[], путём нажатия на одного из них, а затем, нажатия на другого,\nдля транспортировки ресурсов с острова.
bgard.chromium = [cyan]Соберите дополнительный [#9d7f7f]Хром[], перемещая его через [accent]Ударные ускорители[].

cornerstone.mountain = [cyan]Вражеская база сильно защищена.\nСоздайте танки второго уровня, дабы пробиться через вражескую оборону.

escarpment.tantrium = [#90bdd8]Тантрия[cyan] на этом секторе мало.\n\nИзучите и постройте [accent]Тантроформер[cyan], что бы создать [#90bdd8]Тантрий[cyan], используя окружающую среду.

hazard.clevo = [cyan]Изучите [accent]Основной терраформер[], для производства [#afe986]Клеворита[].
hazard.geo = [cyan]Изучите и постройте 2 [accent]Геотермальных генератора[].\nПосле, запитайте их [#b979bd]Миазмой[] и [#76c9e5]Криогеникой[], что бы производить энергию.
hazard.miasma = [#b979bd]Миазма[cyan] очень реактивна с  [#d488ea]Элексиром[], держите свои заводы подальше от неё.

trekker.nuclearlaunch = [accent]⚠ Обнаружен старт ядерной ракеты: [lightgray]{0}
trekker.warning = [red]⚠ ПРИБЛИЖАЕТСЯ ЯДЕРНЫЙ УДАР ⚠\n[lightgray]Создайте запасные ядра немедленно!

pier.aircraft = [red]⚠ Приближаются 2 НЛО ⚠

erid.alu = [cyan]Вы чувствуете исходящую угрозу вокруг вас...
erid.chro = [cyan]Небо темнеет...
erid.clev = [cyan]Оно пробудилось...
erid.mor = [cyan]Шторм приближается...
erid.petal = [cyan]Противник обнаружил ваше присутствие...
erid.grav1 = [cyan]Родес, которых вы знали...
erid.grav2 = [salmon]Обьявились для свержения вас
erid.prepare = [scarlet]Приготовьтесь!

# < Myrra Objectives Region >
myra.south = [cyan]Двигайтесь на юго-запад для получения дальнейших инструкций.
myra.station = [cyan]Это ваша [accent]Станция передачи сигнала[].\n\nОна свяжется с ближайшими базами и запросит подкрепление, для помощи вам.\n\nЗапитайте [accent]Направитель сигнала[] присоединённый к ней, для включения. Не позволяйте ему выключаться после включения.\n\n[salmon]НЕ ДОПУСКАТЬ РАЗБОРА ИЛИ ПОВРЕЖДЕНИЙ ЛЮБОЙ ЦЕНОЙ!
myra.proc.errorcode = [salmon]КОД ОШИБКИ : 67-251\nНЕДОСТАТОЧНОЕ ИЛИ ПЕРЕМЕННОЕ ПИТАНИЕ\nПОЖАЛУЙСТА, УСТРАНИТЕ ПРОБЛЕМУ ДЛЯ ФУНКЦИОНИРОВАНИЯ НАПРАВИТЕЛЯ СИГНАЛА

myra.tier2 = [accent]Вражеское производство эскалирует\nдо [#ffb266]2 уровня[]\nчерез [lightgray]{0}
myra.tier3 = [accent]Вражеское производство эскалирует\nдо [#ff9933]3 уровня[]\nчерез [lightgray]{0}
myra.tier4 = [accent]Вражеское производство эскалирует\nдо [#ff8000]4 уровня[]\nчерез [lightgray]{0}
myra.rancor = [accent]Вражеское производство [#00ffff]Гнева[] начнётся через [lightgray]{0}
myra.monarch = [accent]Вражеское производство [#ff8000]Монархов[] начнётся через [lightgray]{0}
myra.archangel = [accent]Вражеское производство [#ffff00]Архангелов[] начнётся через [lightgray]{0}

myra.nuke = [red]⚠ ПРИБЛИЖАЕТСЯ ЯДЕРНЫЙ УДАР ⚠
myra.passage = [red]⚠ ПРОХОД УНИЧТОЖЕН ⚠
myra.exosphere = [red]Внимание![]\n[accent]Мощный [cyan]Ледяной шторм[] на горизонте!
myra.wave = [lightgray]Вы слышите шум приближающейся армии.
myra.stationdead = [cyan]Наша [accent]Станция передачи сигнала[] уничтожена!\nМы больше [red]не можем[] связатся с соседними базами для подкреплений.
myra.message.relayed = [cyan]Новое сообщение принято вашей [accent]Станцией передачи сигнала!

