unit.exoprosopa-14n-04-sepia.name = Сепия
unit.exoprosopa-14n-04-sepia.description = Защищает ядро Вседозволенность, может строить и быстро добывать ресурсы. Способен атаковать врагов.

unit.exoprosopa-14n-04-t-evernight.name = Цикада
unit.exoprosopa-14n-04-t-evernight.description = Защищает ядро Хребет, может строить и быстро добывать ресурсы. Снабжён дополнительным оружием.

unit.exoprosopa-14n-04-suzuran.name = Сузуран
unit.exoprosopa-14n-04-suzuran.description = Используеться для мгновенного лечения блоков и разведки, только для песочницы.

# Hover Units
unit.exoprosopa-17q-01-codex.name = Искра
unit.exoprosopa-17q-01-codex.description = Стреляет электрическими дугами по врагам, способна преодолевать жидкости.

unit.exoprosopa-17q-02-calaust.name = Сора
unit.exoprosopa-17q-02-calaust.description = Стреляет электрическими дугами по врагам, способна преодолевать жидкости.

unit.exoprosopa-17q-03-syntaxe.name = Удар
