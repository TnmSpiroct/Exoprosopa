# Campaign Sectors
sector.exoprosopa-19s-01-newgrounds.name = Начало
sector.exoprosopa-19s-01-newgrounds.description = Материнский корабль отправил вас сюда в качестве первой миссии.\n\nИзучите доступные ресурсы и возведите инфраструктуру.

sector.exoprosopa-19s-02-mountain-ridge.name = Горный хребет
sector.exoprosopa-19s-02-mountain-ridge.description = Единственный доступный путь из [accent]Начала[].\n\nЭтот сектор богат [#90bdd8]тантрием[] и антрацитом.\nИзучите [accent]Очиститель элексира[] и [accent]Генератор горения[] для противодействия врагу.

sector.exoprosopa-19s-03-hostile-outpost.name = Лагерь
sector.exoprosopa-19s-03-hostile-outpost.description = Этот сектор беден на [#647cc2]кобальтовые[] и антрацитовые залежи в стенах.\nПотребуются[accent]Реактивные буры[] для добычи руд из под земли.\n\nПротивник возвёл тут небольшой лагерь с сильной защитой.\n[accent]Мехи[] и [accent]Шатуны[] необходимы для увеличения вашей огневой мощи.

sector.exoprosopa-19s-04-cliffside.name = Скала
sector.exoprosopa-19s-04-cliffside.description = Данный сектор содержит запасы [#9d7f7f]хрома[].\nИспользуйте [accent]Реактивные буры[] для добычи.\n\nПротивник отправит элитных юнитов для защиты этого сектора.

sector.exoprosopa-19s-05-crest.name = Пик
sector.exoprosopa-19s-05-crest.description = Этот сектор очень тесен и бездорожен.\nТолько [accent]Мехи[] смогут пройти здесь.\n\nСоздайте их как можно больше.\nЗахватите этот сектор.

sector.exoprosopa-19s-06-botanical-garden.name = Ботанический сад
sector.exoprosopa-19s-06-botanical-garden.description = В этом секторе находятся большие запасы [#9d7f7f]хрома[] на другой части острова.\nПрекрасное место для тестирования новой транспортной технологии.\n\nИзучите [accent]Ударный ускоритель[] и [accent]Камеру модернизации кораблей[] для захвата вражеского аванпоста неподалёку.

sector.exoprosopa-19s-07-escarpment.name = Склон
sector.exoprosopa-19s-07-escarpment.description = Важный транспортный узел, соединяющий аванпосты Родес.\nВ виду малого количества [#90bdd8]тантрия[] в этой области, изучите [accent]Тантроформер[], что бы создать [#90bdd8]тантрий[] самому.\n\nРодес не будут добры к вам, и постараются как можно быстрее уничтожить вас.

sector.exoprosopa-19s-08-cornerstone.name = Краеугольный камень
sector.exoprosopa-19s-08-cornerstone.description = Вы приземляетесь на сектор с горным ландшафтом. Вражеская база скрыта за местностью.\nЕдиницы второго уровня могут стать необходимы для захвата.\n\nИзучите [accent]Камеру модернизации танков[] и [accent]Камеру модернизации шатунов[].

sector.exoprosopa-19s-09-hazardous-wasteland.name = Угрожающая пустошь
sector.exoprosopa-19s-09-hazardous-wasteland.description = Будучи богатой [#b979bd]миазмой[], но бедной на антрацит, этот сектор крайне опасен.\nПостройте [accent]Геотермальный генератор[] для выработки энергии.\n\nПротивник возвёл здесь мощную базу с продвинутыми технологиями.\nЗахватите сектор и изучите технологии.

sector.exoprosopa-19s-10-precipice.name = Пропасть
sector.exoprosopa-19s-10-precipice.description = Неровный, искревлённый каньон, использующийся Родес в основном как [accent]Полигон тестирования мехов[].\nНеподготовленная земля затрудняет строительство базы.\n\nИспользуйте [accent]Ударные катапульты[] для перемещения ресурсов по воздуху.\nПодготовьтесь к атакам с разных сторон.
    
sector.exoprosopa-19s-11-creek.name = Бухта
sector.exoprosopa-19s-11-creek.description = Равнина, покрытая цветущим [#53a999]гидритом[] и богатая [#72ccbd]аквамариновыми[] залежами.\nИсследуйте [accent]Аквамариновый фильтр[] и [accent]Элементальный разделитель[], для альтернативного производства базовых материалов.\n\nНаши радары засекли активность Родес. Не дайте им времени прислать сильнейших юнитов.

sector.exoprosopa-19s-12-marshlands.name = Болота
sector.exoprosopa-19s-12-marshlands.description = Данный сектор огромен и полон ресурсами, но будет атакован сразу по приземлению.\n\nИспользуйте [#51c59c]морфит[] для дальнейшей колонизации.\nРодес отправят сильных единиц, дабы остановить ваше завоевание.

# sector.exoprosopa-19s-13-antarstar.name = 
# sector.exoprosopa-19s-13-antarstar.description = 

sector.exoprosopa-19s-14-pier.name = Пирс
sector.exoprosopa-19s-14-pier.description = Этот сектор давно использовался [accent]Гова Индастрис[], но был захвачен Родес из за вечных войн.\nПирс с его производством стали заброшенными и забытыми.\n\n[#4fab92]Астральные[] морские единицы появились на радаре. Они могут быть сильнее обычных[].\n\n[scarlet]Зафиксирован НЛО[].\n\nИспользуйте [#51c59c]Морфитовую плазму[] для создания более мощной обороны. Используйте лучшую тактику против них.

sector.exoprosopa-19s-15-bioproject-core.name = Ядро Биоисследования
sector.exoprosopa-19s-15-bioproject-core.description = Заброшенное исследовательское предприятие, токсичное и не обитаемое.\nСкважины расположены на отдалении друг от друга, исследуйте оставшиеся технологии для выживания.\n\nИспользуйте [accent]Центр фильтрации миазмы[] как альтернативное решение. Так же, изучите [accent]Грузовое депо[] для транспортировки дронами.\n\n[salmon]Зона посадки нестабильна, дополнительные структуры запрещены[].

sector.exoprosopa-19s-16-waterfall.name = Водопад
sector.exoprosopa-19s-16-waterfall.description = Сложный сектор, соединяющий несколько вражеских баз, на каскадных равнинах.\nИспользуйте [accent]Технологии чарования[] для получения продвинутых материалов.\n\nЛетающие единицы обязательны.\nБерегитесь вражеского ПВО.\nНекоторые из них возможно выйдет отключить, уничтожив поддерживающие строения.

sector.exoprosopa-19s-17-isolated-canyon.name = Изолированный каньон
sector.exoprosopa-19s-17-isolated-canyon.description = Тяжело укреплённый каньон, богатый [#ffd5e2]нутрицием[] и [#ff89af]фрагментами лепестков[].\nВ виду плохого рельефа, рекомендуеться использовать комбинацию наземных и летающих единиц.

# sector.exoprosopa-19s-18-polar-station.name = 
# sector.exoprosopa-19s-18-polar-station.description = 

# sector.exoprosopa-19s-19-tundra-peaks.name = 
# sector.exoprosopa-19s-19-tundra-peaks.description = 

sector.exoprosopa-19s-23-eridanus.name = Эрида
sector.exoprosopa-19s-23-eridanus.description = Зигзагообразный ландшафт заставит противника долго добираться до вашей базы.\nНе будьте одурачены большими паузами между волн, Родес будут отправлять своих юнитов быстрее по мере вашего прогресса.\n\nИсследуйте [#bf97d6]гравитикс[]. Избавьтесь от врагов.\n\n\n[cyan]В разработке

# Optional Sectors
sector.exoprosopa-20t-01-luminary.name = Свечение
sector.exoprosopa-20t-01-luminary.description = В виду недостатка скважин, вам потребуеться иной метод добычи энергии.\nВозможно будет неплохо устроить ПВО.\n\n\n[accent]Дополнение: это необязательный сектор. Его захват необязателен для продвижения в кампании.

sector.exoprosopa-20t-02-foggy-fields.name = Туманный альбион
sector.exoprosopa-20t-02-foggy-fields.description = Из за большого количества скважин на этом секторе часто бывает туман.\nПротивник возвёл здесь гигантскую базу. Рекомендуеться устроить сильную огневую мощь.\n\n\n[accent]Дополнение: это необязательный сектор. Его захват необязателен для продвижения в кампании.

sector.exoprosopa-20t-03-reservoir.name = Заброшенный резервуар
sector.exoprosopa-20t-03-reservoir.description = Вы приземляетесь на тесный сектор, наполненный [#b979bd]миазмой[].\nСенсоры пеленгуют тут вражескую базу.\n\nК сожалению, вы должны построить оборону между озером и разрозненной почвой.\nИспользуйте корабли, что бы разобрать врага до того, как он разберёт вас.\n\n\n[accent]Дополнение: это необязательный сектор. Его захват необязателен для продвижения в кампании.

sector.exoprosopa-20t-04-trekker-campsite.name = Горнопроходческий лагерь
sector.exoprosopa-20t-04-trekker-campsite.description = Это горнопроходческий лагерь, контроллируемый Родес.\nИспользуйте разные единицы для уничтожения всех вражеских ядер.\n\n[red]Судя по информации, у врага есть какое-то ядерное оружие, будьте бдительны!\n\n\n[accent]Дополнение: это необязательный сектор. Его захват необязателен для продвижения в кампании.

sector.exoprosopa-20t-11-ridgeline.name = Длинный хребет
sector.exoprosopa-20t-11-ridgeline.description = Родес построили тут мощную фортецию. Она оставалась непобеждённой годами.\nВаша задача - найти любую слабую точку и разрушить крепость.\n\n\n[cyan]Модификаторы:\n- Основной терраформер, Террафильтр и Нихромный разборщик недоступны.\n\n\n[accent]Дополнение: это необязательный сектор. Его захват необязателен для продвижения в кампании.

sector.exoprosopa-20t-26-clover-springs.name = Клеверные источники
sector.exoprosopa-20t-26-clover-springs.description = Горячие источники, оккупированные [accent]Производством Родес[].\nОзёра по центру создают вид клевера с несколькими развлетвлениями.\n\nВы высадитесь на заготовленной базе от другого агента.\nАдаптируйтесь к кратеру и уничтожьте все вражескае ядра.\n\n\n[cyan]В разработке\n\n\n[accent]Дополнение: это необязательный сектор. Его захват необязателен для продвижения в кампании.

sector.exoprosopa-20t-37-myrra-heights.name = Гора Мирра
sector.exoprosopa-20t-37-myrra-heights.description = Высочайшая горная гряда на Фростнове. Колыбель для сильнейших планов Родес.\nПротивник построил экспериментальную [#BF97D6]гравитиксовую[] боеголовку.\n\n[scarlet]ОПАСАЙТЕСЬ ПОТЕНЦИАЛЬНОГО УДАРА[].\n\nМы постараемся отправить вам единиц в помощь. Свяжитесь через [accent]Станцию передачи сигнала[].\nПротивник будет защищать этот сектор всеми силами. Так что ожидайте сильного сопротивления и бесчётного количества борьбы.\n\n[cyan]В разработке\n\n\n[accent]Дополнение: это необязательный сектор. Его захват необязателен для продвижения в кампании.

sector.exoprosopa-20t-99-ending.name = Конец
sector.exoprosopa-20t-99-ending.description = Неужели мы достигли...[gray] конца... ??

# Resources - Items
block.exoprosopa-tech-ore.name = Технометаллоломная стена
block.exoprosopa-bethinecobalt.name = Кобальтовая стена
block.exoprosopa-flower-unique.name = Лепесток цветка
block.exoprosopa-flower-small.name = Малый цветок
block.exoprosopa-flower-large.name = Большой цветок

item.exoprosopa-01a-01-item-cobalt.name = Кобальт
item.exoprosopa-01a-01-item-cobalt.description = Используеться для базового строительства и как боеприпас.

item.exoprosopa-01a-02-item-nickel.name = Никель
item.exoprosopa-01a-02-item-nickel.description = Используется в базовой электронике и заводах.

item.exoprosopa-01a-03-item-anthracite.name = Антрацит
item.exoprosopa-01a-03-item-anthracite.description = Используеться в генераторах для горения и нагрева.

item.exoprosopa-01a-03-item-aquashard.name = Аквамарин
item.exoprosopa-01a-03-item-aquashard.description = Морской материал, как и [#90bdd8]тантрий[].

item.exoprosopa-01a-03-item-lamine.name = Ламин
item.exoprosopa-01a-03-item-lamine.description = Сильно взрывоопасный материал, используется в нагревателях и взрывных снарядах.

item.exoprosopa-01a-04-item-tantra-sand.name = Тантрий
item.exoprosopa-01a-04-item-tantra-sand.description = Используеться в основном для очистки [#d488ea]элексира[], но имеет и другие применения.

item.exoprosopa-01a-05-item-aluminium.name = Алюминий
item.exoprosopa-01a-05-item-aluminium.description = Базово используеться в единицах и электронике.

item.exoprosopa-01a-05-item-raw-nichrome.name = Нихром
item.exoprosopa-01a-05-item-raw-nichrome.description = Сплав [#e1cf9a]никеля[] и [#9d7f7f]хрома[], известный как [#a88b65]нихром[]. Может быть разделён элементальным разделителем.

item.exoprosopa-01a-06-item-chromium.name = Хром
item.exoprosopa-01a-06-item-chromium.description = Крепкий и сильный материал, используемый во множестве зданий и боеприпасах.

item.exoprosopa-01a-07-item-clevorite.name = Клеворит
item.exoprosopa-01a-07-item-clevorite.description = Сверхпроводящий материал, используемый во множестве продвинутых зданий.

item.exoprosopa-01a-08-item-petal.name = Кровавый камень
item.exoprosopa-01a-08-item-petal.description = Высокопрочный материал, используемый в производстве юнитов и управлении гравитацией.

item.exoprosopa-01a-08-item-petal-flower.name = Фрагмент лепестка
item.exoprosopa-01a-08-item-petal-flower.description = Добытый фрагмент лепестка, может быть обьединён с [#ffd5e2]нутрицием[] для создания [#ff91b3]кровавых камней[].

item.exoprosopa-01a-08-item-nucrid.name = Нутриций
item.exoprosopa-01a-08-item-nucrid.description = Прочный материал родом из [#ffd5e2]нутриционных[] стен, может быть укреплён [#ff89af]фрагментами лепестков[].

item.exoprosopa-01a-09-item-morphite.name = Морфит
item.exoprosopa-01a-09-item-morphite.description = Кристалл, высокоэнергетический материал низкого уровня. Используется в электронных компонентах.

item.exoprosopa-01a-10-item-bethine.name = Гравитикс
item.exoprosopa-01a-10-item-bethine.description = Сильный материал, используемый в технологиях управления гравитацией и продвинутых компонентах.

item.exoprosopa-01a-11-item-pyroxene.name = Пироксен
item.exoprosopa-01a-11-item-pyroxene.description = Высокоуровневый материал, используемый в саморемонтирующихся постройках.

item.exoprosopa-01a-11-item-technoscrap.name = Технометалл
item.exoprosopa-01a-11-item-technoscrap.description = Куча металлического хлама, требует фильтрацию перед использованием.

item.exoprosopa-01a-12-item-techno-plating.name = Техно плата
item.exoprosopa-01a-12-item-techno-plating.description = Хранит большие запасы информации и данных, используется в управляющих модулях.

item.exoprosopa-01a-21-item-gryphic.name = Грифик
item.exoprosopa-01a-21-item-gryphic.description = Очищенный [#647cc2]кобальт[], более прочен благодаря добавленной [#60c9ad]некроплазме[].
item.exoprosopa-01a-21-item-gryphic.detail = [cyan]Эксклюзивный предмет Астрала.

item.exoprosopa-01a-22-item-crystallic-geode.name = Кристаллическая жеода
item.exoprosopa-01a-22-item-crystallic-geode.description = Кристаллизированный морфит, неизвестно как он формируется.
item.exoprosopa-01a-22-item-crystallic-geode.details = Колючий и заряженный!

item.exoprosopa-01a-31-item-morphitix-crystal.name = Морфитовый кристалл
item.exoprosopa-01a-31-item-morphitix-crystal.description = Ещё одна форма морфита, использует разгонные кристаллы вместо обычного материала.

# Resources - Liquid
liquid.exoprosopa-02b-01-bioliquid.name = Элексир
liquid.exoprosopa-02b-01-bioliquid.description = Смесь воды и биомассы, может быть отфильтрована для охлаждения или заводов.

liquid.exoprosopa-02b-02-a-purified-elixir.name = Криогеника
liquid.exoprosopa-02b-02-a-purified-elixir.description = Очищенный [#d488ea]элексир[], необходим для продвинутых производств. Может использоваться для охлаждения турелей.

liquid.exoprosopa-02b-02-ichor.name = Ихор
liquid.exoprosopa-02b-02-ichor.description = Истинно чистая жидкость для самопочинки и стабильной регенерации.

liquid.exoprosopa-02b-03-necroplasm.name = Некроплазма
liquid.exoprosopa-02b-03-necroplasm.description = Биологически мутированная жидкость, медленно растёт, пока не достигнет нужного состояния.

liquid.exoprosopa-02b-04-miasma.name = Миазма
liquid.exoprosopa-02b-04-miasma.description = Неконтроллируемая масса серной кислоты, может распространяться на [#d488ea]элексир[].

liquid.exoprosopa-02b-05-hydrowater.name = Гидрит
liquid.exoprosopa-02b-05-hydrowater.description = Используется в очистке [#72ccbd]аквамарина[], противоположность [#d488ea]элексиру[].

liquid.exoprosopa-02b-06-morphitix-plasma.name = Морфитова плазма
liquid.exoprosopa-02b-06-morphitix-plasma.description = Плазма, созданная путем нагрева и разряда [#51c59c]морфита[].

liquid.exoprosopa-02b-07-ectoplasm.name = Эктоплазма
liquid.exoprosopa-02b-07-ectoplasm.description = Опасная жидкость, созданная из [#b979bd]миазмы[], сильно взрывоопасна. Может распространяться на  [#d488ea]элексир[].

liquid.exoprosopa-02b-08-nucliogen.name = Нутрициоген
liquid.exoprosopa-02b-08-nucliogen.description = Вязкая субстанция, побочный продукт из фрагментов лепестков.

# Distribution Blocks
block.exoprosopa-05e-01-transport-pipe.name = Транспортная труба
block.exoprosopa-05e-01-transport-pipe.description = Перемещает предметы вперёд. Может хранить только один предмет.

block.exoprosopa-05e-02-a-aluminium-pipe.name = Алюминиевая труба
block.exoprosopa-05e-02-a-aluminium-pipe.description = Перемещает предметы вперёд. Может хранить только один предмет, не принимает предметы из не труб по бокам.

block.exoprosopa-05e-02-chromium-pipe.name = Хромовая труба
block.exoprosopa-05e-02-chromium-pipe.description = Перемещает предметы вперёд. Быстрее обычных труб. Может хранить только один предмет.

block.exoprosopa-05e-03-armored-pipe.name = Кровавокаменная труба
block.exoprosopa-05e-03-armored-pipe.description = Принимает предметы вперёд, не принимает предметы из не труб по бокам. Бронированна.

block.exoprosopa-05e-03-morphite-conveyor.name = Морфитовый конвеер
block.exoprosopa-05e-03-morphite-conveyor.description = Перемещает предметы пачками, быстрее при запитке энергией.

block.exoprosopa-05e-04-a-morphite-router.name = Морфитовый разделитель
block.exoprosopa-05e-04-a-morphite-router.description = Равномерно распределяет пачки, быстрее при запитке энергией.

block.exoprosopa-05e-05-crossblock.name = Трубный перекрёсток
block.exoprosopa-05e-05-crossblock.description = Действует как мост для труб.

block.exoprosopa-05e-06-splitter.name = Трубный разделитель
block.exoprosopa-05e-06-splitter.description = Равномерно распределяет предметы по 3 выходам.

block.exoprosopa-05e-07-mechanical-bridge.name = Трубный мост
block.exoprosopa-05e-07-mechanical-bridge.description = Перемещает предметы над ландшафтом и зданиями.

block.exoprosopa-05e-08-pipeline-sorter.name = Сортировочная труба
block.exoprosopa-05e-08-pipeline-sorter.description = Может использоваться как направленый разделитель или сортировщик.

block.exoprosopa-05e-10-pipeline-overflow.name = Избыточный трубный затвор
block.exoprosopa-05e-10-pipeline-overflow.description = Выводит предметы по бокам, если передний путь заблокирован.

block.exoprosopa-05e-10-pipeline-underflow.name = Избыточный трубный шлюз
block.exoprosopa-05e-10-pipeline-underflow.description = Выводит предметы вперёд, если боковые пути заблокированы.

block.exoprosopa-05e-11-morph-bridge.name = Морфитовый мост
block.exoprosopa-05e-11-morph-bridge.description = Быстро перемещает предметы над зданиями и ландшафтом, требует энергию.

block.exoprosopa-05e-13-a-surge-driver.name = Ударный ускоритель
block.exoprosopa-05e-13-a-surge-driver.description = Перемещает предметы пачками в другой ускоритель в радиусе.

block.exoprosopa-05e-13-cargobay.name = Грузовое депо
block.exoprosopa-05e-13-cargobay.description = Загружает дрона предметами, для отправки в грузовой выгрузчик.

block.exoprosopa-05e-14-cargodepot.name = Грузовой выгрузчик
block.exoprosopa-05e-14-cargodepot.description = Принимает предметы принесённые грузовыми дронами.

block.exoprosopa-05e-15-pipeline-unloader.name = Разгрузочная труба
block.exoprosopa-05e-15-pipeline-unloader.description = Направленный разгрузчик, не может разгружать из ядер.

# Drills Blocks
block.exoprosopa-04d-01-pressure-generator.name = Генератор давления
block.exoprosopa-04d-01-pressure-generator.description = Генерирует энергию используя давление из скважин.

block.exoprosopa-04d-02-elixir-collector.name = Сборщик элексира
block.exoprosopa-04d-02-elixir-collector.description = Выкачивает [#d488ea]элексир[] из скважин, требует энергию для работы.

block.exoprosopa-04d-02-elixir-extractor.name = Выкачиватель элексира
block.exoprosopa-04d-02-elixir-extractor.description = Улучшенный сборщик [#d488ea]элексира[], требует энергию для работы.

block.exoprosopa-04d-03-ore-extractor.name = Рудный экстрактор
block.exoprosopa-04d-03-ore-extractor.description = Добывает руды перед собой, требует [#d488ea]элексир[] и энергию для работы.

block.exoprosopa-04d-03-r-ore-blaster.name = Рудный бластер
block.exoprosopa-04d-03-r-ore-blaster.description = Улучшенный рудный экстрактор, требует [#76c9e5]криогенику[] для работы.

block.exoprosopa-04d-04-a-wall-extractor.name = Тантриевый бур
block.exoprosopa-04d-04-a-wall-extractor.description = Добывает [#90bdd8]тантрий[] из тантриевых стен.

block.exoprosopa-04d-04-a-wall-shifter.name = Тантриевый экстрактор
block.exoprosopa-04d-04-a-wall-shifter.description = Добывает [#90bdd8]тантрий[] из тантриевых стен, быстрее тантриевого бура.

block.exoprosopa-04d-04-b-aqua-dregder.name = Аквамариновый бур
block.exoprosopa-04d-04-b-aqua-dregder.description = Бурит аквамариновые стены для добычи [#72ccbd]аквамарина[].

block.exoprosopa-04d-04-b-aqua-extractor.name = Аквамариновый экстрактор
block.exoprosopa-04d-04-b-aqua-extractor.description = Медленно добывает [#72ccbd]aquamarine[] из аквамариновых плиток, требует [#53a999]гидрит[] для работы.

block.exoprosopa-04d-04-bore-jet.name = Реактивный бур
block.exoprosopa-04d-04-bore-jet.description = Использует струю [#d488ea]элексира[] под большим давлением для добычи руд из земли.

block.exoprosopa-04d-05-ichor-rig.name = Ихоровый бур
block.exoprosopa-04d-05-ichor-rig.description = Медленно добывает [#edc787]ихор[] из ихоровых плиток, требует большой обьём [#d488ea]элексира[] для работы.

block.exoprosopa-04d-06-nucrid-crusher.name = Нутриционный бур
block.exoprosopa-04d-06-nucrid-crusher.description = добывает [#ffd5e2]нутриций[] из нутриционных стен.

block.exoprosopa-04d-06-nucrid-scrapper.name = Нутриционный шредер
block.exoprosopa-04d-06-nucrid-scrapper.description = Добывает [#ffd5e2]нутриций[] из нутриционных стен. Быстрее нутриционного бура. Требует [#d488ea]элексир[] и энергию для работы.

block.exoprosopa-04d-07-gravitix-drill.name = Разрядный бур
block.exoprosopa-04d-07-gravitix-drill.description = С пользой используя [#bf97d6]гравитикс[], [#edc787]ихор[] создаёт локальное искажение гравитации. Результат осторожно собирается и перемещаеться в землю, выталкивая руды наружу.

# Liquid Blocks
block.exoprosopa-06f-01-a-sea-conduit.name = Жидкостный передатчик
block.exoprosopa-06f-01-a-sea-conduit.description = Перемещает жидкости и газы вперёд

block.exoprosopa-06f-01-b-aqua-conduit.name = Аквамариновый передатчик
block.exoprosopa-06f-01-b-aqua-conduit.description = Перемещает жидкости и газы вперёд, куда прочнее жидкостного передатчика.

block.exoprosopa-06f-02-hoverducts.name = Антригравитационный передатчик
block.exoprosopa-06f-02-hoverducts.description = Использует антигравитацию для передачи жидкости вперёд, намного быстрее обычного передатчика.

block.exoprosopa-06f-02-seaduct-junction.name = Перекрёсток передатчиков
block.exoprosopa-06f-02-seaduct-junction.description = Работает как мост для передатчикоа.

block.exoprosopa-06f-03-seaduct-router.name = Маршрутизатор передатчиков
block.exoprosopa-06f-03-seaduct-router.description = Равномерно совмещает и распределяет жидкости.

block.exoprosopa-06f-04-liquidbridge.name = Мостовой передатчик
block.exoprosopa-06f-04-liquidbridge.description = Перемещает жидкости над ландшафтом и зданиями.

block.exoprosopa-06f-04-m-clevoritebridge.name = Усиленный мостовой передатчик
block.exoprosopa-06f-04-m-clevoritebridge.description = Перемещает жидкости над зданиями, имеет больший радиус, нежели мостовой передатчик

block.exoprosopa-06f-05-a-morph-liquidbridge.name = Морфитовый мостовой передатчик
block.exoprosopa-06f-05-a-morph-liquidbridge.description = Перемещает жидкости над зданиями и ландшафтом на высокой скорости.

block.exoprosopa-06f-05-jet-pump.name = Реактивная помпа
block.exoprosopa-06f-05-jet-pump.description = Выкачивает жидкости. Требует [#76c9e5]криогенику[] для работы.

block.exoprosopa-06f-05-pump.name = Гидролитовая ромпа
block.exoprosopa-06f-05-pump.description = Выкачивает большой обьём жидкости. Требует энергию для работы.

block.exoprosopa-06f-06-aqua-container.name = Жидкостное хранилище
block.exoprosopa-06f-06-aqua-container.description = Хранит небольшое количество жидкости.

block.exoprosopa-06f-07-large-aqua-container.name = Большое жидкостное хранилище
block.exoprosopa-06f-07-large-aqua-container.description = Хранит большое количество жидкости.

block.exoprosopa-06f-07-massive-container.name = Усиленное жидкостное хранилище
block.exoprosopa-06f-07-massive-containerr.description = Хранит огромный обьём жидкости.

block.exoprosopa-06f-08-mfu.name = Центр фильтрации миазмы
block.exoprosopa-06f-08-mfu.description = Фильтрует [#b979bd]миазму[] в [#d488ea]элексир[] используя [#90bdd8]тантрий[]. [red]Внимание! Протечка может вызвать заражение миазмой![]

block.exoprosopa-06f-09-nullifier.name = Обнулитель
block.exoprosopa-06f-09-nullifier.description = Смешиваеь [#edc787]ихор[] с [#ffffff]эктоплазмой[] для синтеза [#b979bd]миазмы[].

# Logic
block.exoprosopa-12l-001-message-chip.name = Сообщающий чип
block.exoprosopa-12l-001-message-chip.description = Может хранить читабельное сообщение для союзников.

block.exoprosopa-12l-002-switch.name = Переключающий чип
block.exoprosopa-12l-002-switch.description = Переключаеться между 0 и 1 при включении/выключении.

block.exoprosopa-12l-003-terminator.name = Терминал
block.exoprosopa-12l-003-terminator.description = Выполняет написаный код. Может управлять зданиями и юнитами.

block.exoprosopa-12l-004-1-executor.name = Гипер терминал
block.exoprosopa-12l-004-1-executor.description = Выполняет написаный код. Может управлять зданиями и юнитами. Быстрее стандартного терминала.

block.exoprosopa-12l-004-cell-data.name = Запоминающий чип
block.exoprosopa-12l-004-cell-data.description = Хранит данные для чтения терминалами.

block.exoprosopa-12l-005-cell-data-large.name = Большой запоминающий чип
block.exoprosopa-12l-005-cell-data-large.description = Хранит большой обьём данный для чтения терминалами.

block.exoprosopa-12l-005-mini-projector.name = Малый проекционный чип
block.exoprosopa-12l-005-mini-projector.description = Визуализирует код.

block.exoprosopa-12l-005-projector.name = Проекционный чип
block.exoprosopa-12l-005-projector.description = Визуализирует код.

block.exoprosopa-10i-001-canvas.name = Полотно
block.exoprosopa-10i-001-canvas.description = Отображает простые изображения с заготовленными цветами. Изменяемый.

block.exoprosopa-10i-002-canvas-large.name = Большое полотно
block.exoprosopa-10i-002-canvas-large.description = Отображает большие изображения с заготовленными цветами. Изображения можно импортировать и экспортировать. Изменяемый.

block.exoprosopa-10i-003-canvas-massive.name = Мульти полотно
block.exoprosopa-10i-003-canvas-massive.description = Отображает простые изображения с заготовленными цветами. Изображения можно импортировать и экспортировать. Изменяемый.

# Power Blocks
block.exoprosopa-07g-01-powerline.name = Энерготочка
block.exoprosopa-07g-01-powerline.description = Передаёт энергию по прямой.

block.exoprosopa-07g-01-q-powerbeam.name = Энергоузел
block.exoprosopa-07g-01-q-powerbeam.description = Передаёт энергию по прямой. Имеет больший радиус, нежели энерготочка.

block.exoprosopa-07g-02-large-powerline.name = Большая энерготочка
block.exoprosopa-07g-02-large-powerline.description = Передаёт энергию на большое расстояние, может иметь только 1 контакт.

block.exoprosopa-07g-02-las-morphite-node.name = Морфитовый энергоузел
block.exoprosopa-07g-02-las-morphite-node.description = Передаёт энергию на среднее расстояние. Может иметь несколько соединений.

block.exoprosopa-07g-02-lb-supernode.name = Тестовый энергоузел
block.exoprosopa-07g-02-lb-supernode.description = Соединяеться с незапитанными блоками. Полезен для тестирования карт в редакторе.

block.exoprosopa-07g-02-m-small-powerbank.name = Малое энергохранилище
block.exoprosopa-07g-02-m-small-powerbank.description = Батарея, хранящая небольшое количество энергии

block.exoprosopa-07g-03-a-powerbank.name = Энергохранилище
block.exoprosopa-07g-03-a-powerbank.description = Батарея, хранящая большое количество энергии.

block.exoprosopa-07g-03-b-power-director.name = Перенаправитель энергии
block.exoprosopa-07g-03-b-power-director.description = Выравнивает электроэнергию у блока спереди, заимствуя её у блока позади, но только избыточной энергией.

block.exoprosopa-07g-03-burner-generator.name = Генератор горения
block.exoprosopa-07g-03-burner-generator.description = Сжигает горящие материалы с помощью [#d488ea]элексира[] для генерации энергии.

block.exoprosopa-07g-04-burner-reactor.name = Реактор горения
block.exoprosopa-07g-04-burner-reactor.description = Сжигает горящие материалы для генерации энергии, требует [#76c9e5]криогенику[] и [#9d7f7f]хромиум[] для работы.

block.exoprosopa-07g-05-a-geogenerator.name = Геотермальный генератор
block.exoprosopa-07g-05-a-geogenerator.description = Использует [#b979bd]миазму[] и [#76c9e5]криогенику[] для нагрева земли и генерации энергии.

block.exoprosopa-07g-05-morphite-solarpanel.name = Экзосферная панель
block.exoprosopa-07g-05-morphite-solarpanel.description = Пассивно генерирует немного энергии.

block.exoprosopa-07g-05-tokamak-reactor.name = Токамак
block.exoprosopa-07g-05-tokamak-reactor.description = Генерирует большой обьём энергии, используя [#51c59c]морфитовую плазму[] и [#edc787]ихор[]. Сильно взорвётся при недостатке ихора или морфитовой плазмы.

block.exoprosopa-07g-10-necroplasm-reactor.name = Некроплазменный реактор
block.exoprosopa-07g-10-necroplasm-reactor.description = Использует [#60c9ad]некроплазменную[] радиоактивность для генерации энергии и  [#ffffff]эктоплазмы[], как побочный продукт. Серьёзно взорвётся, если  [#ffffff]эктоплазмы[] будет слишком много.

block.exoprosopa-07g-11-hybrid-reactor.name = Гибридный реактор
block.exoprosopa-07g-11-hybrid-reactor.description = Использует разные жидкости и газы для дифузии пироксена.

# Production - Blocks
block.exoprosopa-09i-01-aluminium-furnace.name = Алюминиевая плавильня
block.exoprosopa-09i-01-aluminium-furnace.description = Выплавляет [#647cc2]кобальт[] в [#729aaf]алюминий[], используя антрацит как топливо.

block.exoprosopa-09i-02-a-aluminium-refinery-forge.name = Алюминиевая очистная печь
block.exoprosopa-09i-02-a-aluminium-refinery-forge.description = Сплавляет [#e1cf9a]никель[] и [#647cc2]кобальт[], используя большой оьбём антрацита, что позволяет ударно ускорить производство [#729aaf]алюминия[].

block.exoprosopa-09i-02-elixir-converter.name = Криогенный очиститель
block.exoprosopa-09i-02-elixir-converter.description = Процеживает [#d488ea]элексир[], используя [#90bdd8]тантрий[] как фильтр.

block.exoprosopa-09i-02-f-elixir-autofreezer.name = Криогенный охлаждатель
block.exoprosopa-09i-02-f-elixir-autofreezer.description = Процеживает [#d488ea]элексир[] быстрее, чем криогенный очиститель. Допольнительно использует [#647cc2]кобальт[] для большей эффективности.

block.exoprosopa-09i-03-cryo-synthetis-chamber.name = Криогенная камера синтеза
block.exoprosopa-09i-03-cryo-synthetis-chamber.description = Purifies [#d488ea]elixir[] into [#76C9E5]cryogenics[] without dematerializing it. Uses [#ffd5e2]nucridscrap[] as a main fuel, requires medium amount of power.

block.exoprosopa-09i-04-a-terra-basin.name = Основной терраформер
block.exoprosopa-09i-04-a-terra-basin.description = Использует [#76c9e5]криогенику[] для трансформации [#e1cf9a]никеля[], и производства высокозаряженого [#afe986]клеворита[]. Выводит [#647cc2]кобальт[] и [#d488ea]элексир[] как побочный продукт.

block.exoprosopa-09i-04-b-mini-basin.name = Террафильтр
block.exoprosopa-09i-04-b-mini-basin.description = Использует [#76c9e5]криогенику[] и [#b979bd]миазму[] для трансформации [#e1cf9a]никеля[] в [#afe986]клеворит[], имеет высокий порог конвертации и не выводит побочных продуктов.

block.exoprosopa-09i-04-clevorite-disassembler.name = Нихромный разборщик
block.exoprosopa-09i-04-clevorite-disassembler.description = Создаёт [#afe986]клеворит[] из [#a88b65]нихрома[] и [#76c9e5]криогеникой[]. Производит [#729aaf]алюминий[] и [#9d7f7f]хром[] как побочный продукт.

block.exoprosopa-09i-04-heavy-ichor-mixer.name = Ихоровый сварщик
block.exoprosopa-09i-04-heavy-ichor-mixer.description = Обьединяет [#76C9E5]криогенику[] и [#90BDD8]тантрий[] для производства [#edc787]ихора[].

block.exoprosopa-09i-04-ichor-regulator.name = Тяжёлый ихоровый сварщик
block.exoprosopa-09i-04-ichor-regulator.description = Обьединяет [#76C9E5]криогенику[] с [#FFD5E2]нутрицием[] для создания большого обьёма [#edc787]ихора[]. Требует тепло для работы.

block.exoprosopa-09i-04-laminator.name = Ламинатор
block.exoprosopa-09i-04-laminator.description = Производит ламин, путём совмещения антрацита, [#e1cf9a]никеля[] и [#b979bd]миазмы[], что выступает как стабилизатор.

block.exoprosopa-09i-04-lamine-chamber.name = Взрывная камера
block.exoprosopa-09i-04-lamine-chamber.description = Конвертирует [#afe986]клеворит[] в большой обьём ламина, с побочным [#edc787]ихором[].

block.exoprosopa-09i-04-tantraformer.name = Тантроформер
block.exoprosopa-09i-04-tantraformer.description = Перемалывает [#e1cf9a]никель[] с антрацитом, для создания [#90bdd8]тантрия[]. Требует [#d488ea]элексир[] для начала процесса.

block.exoprosopa-09i-04-u-aquafilter.name = Аквамариновый фильтр
block.exoprosopa-09i-04-u-aquafilter.description = Использует [#53a999]гидрит[] для фильтрации [#72ccbd]аквамарина[] в [#647cc2]кобальт[] и [#a88b65]нихром[].

block.exoprosopa-09i-04-v-elemental-separator.name = Элементальный разделитель
block.exoprosopa-09i-04-v-elemental-separator.description = Разделяет [#a88b65]нихром[] используя [#90bdd8]тантрий[] и [#53a999]гидрит[].

block.exoprosopa-09i-11-morphifier-crystallizer.name = Морфитовый ускоритель
block.exoprosopa-09i-11-morphifier-crystallizer.description = Разгоняет [#9d7f7f]хром[] для больших скоростей, используя [#76c9e5]криогенику[], для создания [#51c59c]морфита[]. Побочно производит [#ffffff]эктоплазму[].

block.exoprosopa-09i-11-n-morphite-liquidfier.name = Морфитовый разрядник
block.exoprosopa-09i-11-n-morphite-liquidfier.description = Нагревает [#51c59c]морфит[] [#b979bd]миазмой[] и [#edc787]ихором[], для создания [#51c59c]морфитовой плазмы[].

block.exoprosopa-09i-11-o-anthracite-heater.name = Антрацитовый нагреватель
block.exoprosopa-09i-11-o-anthracite-heater.description = Сжигает антрацит для создания малого количества тепла.

block.exoprosopa-09i-11-o-miasma-heater.name = Миазмовый нагреватель
block.exoprosopa-09i-11-o-miasma-heater.description = Сжигает органическое топливо для создания среднего количества тепла..

block.exoprosopa-09i-11-o-radiative-heater.name = Радиоационный нагреватель
block.exoprosopa-09i-11-o-radiative-heater.description = Использует ламин и [#C63B64]нуклиоген[] для создания большого количества тепла.

