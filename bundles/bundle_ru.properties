unit.exoprosopa-17q-04-noya.name = Небесный клинок
unit.exoprosopa-17q-04-noya.description = Заряжает и запускает дальнобойную плазменную сферу с большим уроном и пробитием. Имеет две лазерные пушки по бокам и шит спереди.

unit.exoprosopa-17q-05-archangel.name = Архангел
unit.exoprosopa-17q-05-archangel.description = Стреляет дальнобойным пробивным снарядом. Экипирован двумя подавляющими ракетницами.

#Walker Units
unit.exoprosopa-18r-01-byte.name = Бит
unit.exoprosopa-18r-01-byte.description = Стреляет электрическими пулями по врагам. Защищается направленным щитом.

unit.exoprosopa-18r-02-syntax.name = Синтекс
unit.exoprosopa-18r-02-syntax.description = Запускает оглушающие электрические сферы. Защищается направленным щитом.

unit.exoprosopa-18r-03-decode.name = Декодер
